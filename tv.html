<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KitsuStream - Dettaglio Serie TV</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    min-height: 100vh;
}

.topbar {
    display: flex;
    align-items: center;
    padding: 20px 30px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left, .topbar-right {
    width: 120px;
}

.topbar-center {
    flex: 1;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: 28px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 20px rgba(124,58,237,0.3);
}

.back-btn, .list-btn {
    background: rgba(124, 58, 237, 0.8);
    border: none;
    padding: 10px 20px;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
}

.back-btn:hover, .list-btn:hover {
    background: #7c3aed;
    transform: translateY(-2px);
}

.container {
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 30px;
}

.tv-details {
    background: rgba(31, 27, 58, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 40px;
}

.tv-header {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
}

.tv-poster {
    flex-shrink: 0;
}

.tv-poster img {
    width: 300px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.tv-info {
    flex: 1;
}

.tv-title {
    font-size: 32px;
    margin-bottom: 10px;
    color: #c084fc;
}

.tv-meta {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin: 15px 0;
    color: #aaa;
}

.rating {
    color: #ffd700;
    font-size: 18px;
}

.overview {
    margin: 20px 0;
    line-height: 1.6;
    color: #ddd;
}

.genres {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 20px 0;
}

.genre-tag {
    background: rgba(124, 58, 237, 0.3);
    padding: 5px 15px;
    border-radius: 20px;
    font-size: 12px;
}

.watch-buttons {
    display: flex;
    gap: 15px;
    margin-top: 25px;
    flex-wrap: wrap;
}

.watch-btn, .list-toggle-btn {
    padding: 12px 30px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.watch-btn {
    background: #ef4444;
    color: white;
}

.watch-btn:hover {
    background: #dc2626;
    transform: translateY(-2px);
}

.list-toggle-btn {
    background: #7c3aed;
    color: white;
}

.list-toggle-btn:hover {
    background: #6d28d9;
    transform: translateY(-2px);
}

.seasons-section, .episodes-section {
    background: rgba(31, 27, 58, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    margin-top: 30px;
}

.section-title {
    font-size: 24px;
    margin-bottom: 20px;
    color: #c084fc;
}

.seasons-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.season-card {
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.season-card:hover {
    background: rgba(124, 58, 237, 0.3);
    transform: translateY(-3px);
}

.season-poster {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 10px;
}

.season-number {
    font-size: 18px;
    font-weight: bold;
    margin: 10px 0 5px;
}

.season-episodes {
    font-size: 12px;
    color: #aaa;
}

.season-selector {
    margin-bottom: 20px;
}

.season-select {
    padding: 10px 20px;
    border-radius: 8px;
    background: #1f1b3a;
    color: white;
    border: 1px solid #7c3aed;
    cursor: pointer;
}

.episodes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 15px;
}

.episode-card {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 15px;
    transition: all 0.3s ease;
}

.episode-card:hover {
    background: rgba(124, 58, 237, 0.2);
}

.episode-number {
    font-size: 14px;
    color: #c084fc;
    margin-bottom: 5px;
}

.episode-name {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 8px;
}

.episode-overview {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 10px;
    line-height: 1.4;
}

.play-episode-btn {
    padding: 8px 16px;
    background: #ef4444;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-size: 12px;
    margin-top: 10px;
}

/* PLAYER */
.player-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.player-box {
    width: 90%;
    max-width: 1100px;
    background: #000;
    border-radius: 15px;
    overflow: hidden;
}

.player-box iframe {
    width: 100%;
    height: 60vh;
    min-height: 400px;
    border: none;
}

.player-controls {
    padding: 15px;
    display: flex;
    justify-content: space-between;
    background: #1a1a1a;
}

.close-btn {
    background: #ef4444;
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.fullscreen-btn {
    background: #00d4ff;
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.loading {
    text-align: center;
    padding: 50px;
    font-size: 18px;
    color: #c084fc;
}

/* TORNA SU */
#tornaSu {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    font-size: 24px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(124,58,237,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    z-index: 9998;
}

#tornaSu:hover {
    transform: translateY(-5px);
    background: linear-gradient(135deg, #a855f7, #c084fc);
    box-shadow: 0 6px 20px rgba(124,58,237,0.8);
}

@media (max-width: 768px) {
    .tv-header {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
    
    .tv-poster img {
        width: 200px;
    }
    
    .tv-title {
        font-size: 24px;
    }
    
    .container {
        padding: 0 20px;
    }
    
    .player-box iframe {
        height: 40vh;
    }
    
    h1 {
        font-size: 20px;
    }
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left">
        <button class="back-btn" onclick="goBack()">⬅️ Indietro</button>
    </div>
    <div class="topbar-center">
        <h1>📺 KitsuStream</h1>
    </div>
    <div class="topbar-right">
        <button class="list-btn" onclick="goToList()">⭐ Lista</button>
    </div>
</div>

<div class="container">
    <div id="tvDetails" class="tv-details">
        <div class="loading">Caricamento...</div>
    </div>
</div>

<div id="playerModal" class="player-modal" onclick="handleOutsideClick(event)">
    <div class="player-box" id="playerBox">
        <iframe id="videoFrame" allowfullscreen></iframe>
        <div class="player-controls">
            <button class="close-btn" onclick="closePlayer()">❌ Chiudi</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Schermo intero</button>
        </div>
    </div>
</div>

<button id="tornaSu" title="Torna su">↑</button>

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";
const BACKDROP_BASE = "https://image.tmdb.org/t/p/original";

let tvId = null;
let tvData = null;
let selectedSeason = 1;

function getTVIdFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
}

async function loadTVDetails() {
    tvId = getTVIdFromURL();
    
    if (!tvId) {
        document.getElementById("tvDetails").innerHTML = '<div class="loading">❌ ID serie TV non valido</div>';
        return;
    }
    
    try {
        const response = await fetch(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${API_KEY}&language=it-IT&append_to_response=credits`);
        const data = await response.json();
        tvData = data;
        
        displayTVDetails(data);
        loadSeasons(data.seasons);
        loadEpisodes(1);
        
    } catch (error) {
        console.error("Errore:", error);
        document.getElementById("tvDetails").innerHTML = '<div class="loading">❌ Errore nel caricamento</div>';
    }
}

function displayTVDetails(tv) {
    const posterUrl = tv.poster_path ? IMG_BASE + tv.poster_path : "https://via.placeholder.com/300x450?text=No+Image";
    const backdropUrl = tv.backdrop_path ? BACKDROP_BASE + tv.backdrop_path : "";
    
    const inList = isInList(tv.id);
    
    const html = `
        <div class="tv-header">
            <div class="tv-poster">
                <img src="${posterUrl}" alt="${tv.name}">
            </div>
            <div class="tv-info">
                <h2 class="tv-title">${escapeHtml(tv.name)}</h2>
                <div class="tv-meta">
                    <span>📅 ${tv.first_air_date ? tv.first_air_date.split("-")[0] : "N/D"}</span>
                    <span>⭐ <span class="rating">${tv.vote_average ? tv.vote_average.toFixed(1) : "N/A"}/10</span></span>
                    <span>🎬 ${tv.number_of_seasons} stagioni</span>
                    <span>📺 ${tv.number_of_episodes} episodi</span>
                </div>
                <div class="genres">
                    ${tv.genres ? tv.genres.map(g => `<span class="genre-tag">${g.name}</span>`).join("") : ""}
                </div>
                <div class="overview">
                    <strong>Trama:</strong><br>
                    ${tv.overview || "Trama non disponibile."}
                </div>
                <div class="watch-buttons">
                    <button class="watch-btn" onclick="playFirstEpisode()">▶ Guarda primo episodio</button>
                    <button class="list-toggle-btn" id="listBtn" onclick="toggleListFromDetails()">
                        ${inList ? "❌ Rimuovi dalla lista" : "⭐ Aggiungi alla lista"}
                    </button>
                </div>
            </div>
        </div>
    `;
    
    document.getElementById("tvDetails").innerHTML = html;
    
    if (backdropUrl) {
        document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url(${backdropUrl})`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundAttachment = "fixed";
    }
}

function loadSeasons(seasons) {
    const validSeasons = seasons.filter(s => s.season_number > 0 && s.episode_count > 0);
    
    const seasonsHtml = `
        <div class="seasons-section">
            <h3 class="section-title">📺 Stagioni</h3>
            <div class="seasons-grid">
                ${validSeasons.map(season => `
                    <div class="season-card" onclick="selectSeason(${season.season_number})">
                        <img class="season-poster" src="${season.poster_path ? IMG_BASE + season.poster_path : 'https://via.placeholder.com/300x150?text=Season+' + season.season_number}" alt="Stagione ${season.season_number}">
                        <div class="season-number">Stagione ${season.season_number}</div>
                        <div class="season-episodes">📺 ${season.episode_count} episodi</div>
                        <div class="season-date">📅 ${season.air_date ? season.air_date.split("-")[0] : "N/D"}</div>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
    
    document.getElementById("tvDetails").insertAdjacentHTML("beforeend", seasonsHtml);
}

async function loadEpisodes(seasonNumber) {
    selectedSeason = seasonNumber;
    
    try {
        const response = await fetch(`https://api.themoviedb.org/3/tv/${tvId}/season/${seasonNumber}?api_key=${API_KEY}&language=it-IT`);
        const seasonData = await response.json();
        
        displayEpisodes(seasonData);
        
    } catch (error) {
        console.error("Errore episodi:", error);
    }
}

function displayEpisodes(seasonData) {
    const existingSection = document.querySelector(".episodes-section");
    if (existingSection) existingSection.remove();
    
    const episodesHtml = `
        <div class="episodes-section">
            <h3 class="section-title">📺 Stagione ${seasonData.season_number} - Episodi</h3>
            <div class="season-selector">
                <select class="season-select" onchange="changeSeason(this.value)">
                    ${getSeasonOptions()}
                </select>
            </div>
            <div class="episodes-grid">
                ${seasonData.episodes.map(episode => `
                    <div class="episode-card">
                        <div class="episode-number">Episodio ${episode.episode_number}</div>
                        <div class="episode-name">${escapeHtml(episode.name)}</div>
                        <div class="episode-overview">${episode.overview ? episode.overview.substring(0, 100) + "..." : "Descrizione non disponibile"}</div>
                        <div class="episode-meta" style="font-size: 11px; color: #888; margin-top: 8px;">
                            ⏱️ ${episode.runtime ? episode.runtime + " min" : "N/D"} | ⭐ ${episode.vote_average ? episode.vote_average.toFixed(1) : "N/A"}/10
                        </div>
                        <button class="play-episode-btn" onclick="playEpisode(${seasonData.season_number}, ${episode.episode_number})">
                            ▶ Guarda episodio
                        </button>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
    
    document.getElementById("tvDetails").insertAdjacentHTML("beforeend", episodesHtml);
}

function getSeasonOptions() {
    if (!tvData || !tvData.seasons) return "";
    
    const validSeasons = tvData.seasons.filter(s => s.season_number > 0 && s.episode_count > 0);
    
    return validSeasons.map(season => `
        <option value="${season.season_number}" ${selectedSeason == season.season_number ? "selected" : ""}>
            Stagione ${season.season_number} (${season.episode_count} episodi)
        </option>
    `).join("");
}

function changeSeason(seasonNumber) {
    loadEpisodes(parseInt(seasonNumber));
}

function selectSeason(seasonNumber) {
    loadEpisodes(seasonNumber);
    document.querySelector(".episodes-section").scrollIntoView({ behavior: "smooth" });
}

function playEpisode(season, episode) {
    const url = `https://vixsrc.to/tv/${tvId}/${season}/${episode}?lang=it`;
    openPlayer(url);
}

function playFirstEpisode() {
    if (tvData && tvData.seasons) {
        const firstSeason = tvData.seasons.find(s => s.season_number === 1 && s.episode_count > 0);
        if (firstSeason) {
            playEpisode(1, 1);
        } else {
            alert("Primo episodio non disponibile");
        }
    }
}

function getList() {
    return JSON.parse(localStorage.getItem("myMediaList")) || [];
}

function saveList(list) {
    localStorage.setItem("myMediaList", JSON.stringify(list));
}

function isInList(id) {
    return getList().some(item => item.id === id && item.type === "tv");
}

function toggleListFromDetails() {
    if (!tvData) return;
    
    let list = getList();
    const exists = list.find(item => item.id === tvData.id && item.type === "tv");
    
    if (exists) {
        list = list.filter(item => !(item.id === tvData.id && item.type === "tv"));
    } else {
        list.push({
            id: tvData.id,
            title: tvData.name,
            poster: tvData.poster_path ? IMG_BASE + tvData.poster_path : "",
            rating: tvData.vote_average,
            year: tvData.first_air_date ? tvData.first_air_date.split("-")[0] : "N/D",
            type: "tv",
            mediaType: "Serie TV",
            seasons: tvData.number_of_seasons
        });
    }
    
    saveList(list);
    
    const btn = document.getElementById("listBtn");
    const nowInList = !exists;
    btn.innerHTML = nowInList ? "❌ Rimuovi dalla lista" : "⭐ Aggiungi alla lista";
    btn.style.background = nowInList ? "#ef4444" : "#7c3aed";
}

function openPlayer(url) {
    document.getElementById("videoFrame").src = url;
    document.getElementById("playerModal").style.display = "flex";
}

function closePlayer() {
    document.getElementById("videoFrame").src = "";
    document.getElementById("playerModal").style.display = "none";
}

function handleOutsideClick(e) {
    const box = document.getElementById("playerBox");
    if (!box.contains(e.target)) closePlayer();
}

function toggleFullscreen() {
    const box = document.getElementById("playerBox");
    if (!document.fullscreenElement) {
        box.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

function goBack() {
    window.history.back();
}

function goToList() {
    window.location.href = "list.html";
}

function escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

/* TORNA SU */
const tornaSuBtn = document.getElementById("tornaSu");

window.addEventListener("scroll", function() {
    if (window.scrollY > 300) {
        tornaSuBtn.style.display = "flex";
    } else {
        tornaSuBtn.style.display = "none";
    }
});

tornaSuBtn.addEventListener("click", function() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
});

loadTVDetails();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KitsuStream - Dettaglio Serie TV</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    min-height: 100vh;
}

/* ============================================ */
/* STILE MOBILE (default - fino a 768px) */
/* ============================================ */

/* Topbar mobile */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left, .topbar-right {
    width: auto;
}

.topbar-center {
    flex: 1;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.back-btn, .list-btn {
    background: rgba(124, 58, 237, 0.9);
    border: none;
    padding: 6px 12px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s ease;
}

.back-btn:active, .list-btn:active {
    transform: scale(0.95);
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 16px;
}

/* TV details mobile */
.tv-details {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

.tv-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 20px;
}

.tv-poster {
    flex-shrink: 0;
}

.tv-poster img {
    width: 180px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.tv-info {
    flex: 1;
}

.tv-title {
    font-size: 24px;
    margin-bottom: 8px;
    color: #c084fc;
}

.tv-meta {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin: 12px 0;
    color: #aaa;
    font-size: 11px;
}

.rating {
    color: #ffd700;
    font-size: 14px;
}

.overview {
    margin: 16px 0;
    line-height: 1.5;
    color: #ddd;
    font-size: 13px;
    text-align: left;
}

.genres {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 16px 0;
}

.genre-tag {
    background: rgba(124, 58, 237, 0.3);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
}

.watch-buttons {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    justify-content: center;
}

.watch-btn, .list-toggle-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.watch-btn {
    background: #ef4444;
    color: white;
}

.watch-btn:active {
    transform: scale(0.96);
    background: #dc2626;
}

.list-toggle-btn {
    background: #7c3aed;
    color: white;
}

.list-toggle-btn:active {
    transform: scale(0.96);
    background: #6d28d9;
}

/* Sezioni mobile */
.info-section, .seasons-section, .episodes-section, .similar-section, .cast-section {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-top: 16px;
}

.section-title {
    font-size: 18px;
    margin-bottom: 16px;
    color: #c084fc;
}

.info-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.info-card {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 10px;
}

.info-label {
    font-size: 10px;
    color: #888;
    margin-bottom: 4px;
}

.info-value {
    font-size: 12px;
    font-weight: bold;
    color: #c084fc;
    word-break: break-word;
}

/* Stagioni mobile */
.seasons-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.season-card {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    text-align: center;
}

.season-card:active {
    transform: scale(0.98);
    background: rgba(124, 58, 237, 0.3);
}

.season-poster {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 8px;
}

.season-number {
    font-size: 14px;
    font-weight: bold;
    margin: 8px 0 4px;
}

.season-episodes {
    font-size: 10px;
    color: #aaa;
}

/* Episodi mobile */
.season-selector {
    margin-bottom: 16px;
}

.season-select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 30px;
    background: #1f1b3a;
    color: white;
    border: 1px solid #7c3aed;
    cursor: pointer;
    font-size: 13px;
}

.episodes-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
}

.episode-card {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 12px;
}

.episode-card:active {
    background: rgba(124, 58, 237, 0.2);
}

.episode-number {
    font-size: 12px;
    color: #c084fc;
    margin-bottom: 4px;
}

.episode-name {
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 6px;
}

.episode-overview {
    font-size: 11px;
    color: #aaa;
    margin-bottom: 8px;
    line-height: 1.4;
}

.play-episode-btn {
    padding: 8px 12px;
    background: #ef4444;
    border: none;
    border-radius: 20px;
    color: white;
    cursor: pointer;
    font-size: 11px;
    margin-top: 8px;
    width: 100%;
}

.play-episode-btn:active {
    transform: scale(0.97);
}

/* Similar mobile */
.similar-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.similar-card {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
}

.similar-poster {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.similar-info {
    padding: 8px;
}

.similar-title {
    font-size: 11px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.similar-year {
    font-size: 9px;
    color: #888;
}

/* Cast mobile */
.cast-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.cast-card {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
}

.cast-photo {
    width: 100%;
    height: 100px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 8px;
}

.cast-name {
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 4px;
}

.cast-character {
    font-size: 10px;
    color: #aaa;
}

/* Player mobile */
.player-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.player-box {
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.player-box iframe {
    width: 100%;
    height: 50vh;
    border: none;
}

.player-controls {
    padding: 12px;
    display: flex;
    justify-content: center;
    gap: 10px;
    background: #1a1a1a;
    flex-wrap: wrap;
}

.player-controls button {
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 12px;
    cursor: pointer;
    border: none;
    color: white;
}

.close-btn {
    background: #ef4444;
}

.fullscreen-btn {
    background: #00d4ff;
}

.save-btn {
    background: #f59e0b;
}

.reset-btn {
    background: #ef4444;
}

.saved-info {
    text-align: center;
    margin-top: 8px;
    min-height: 30px;
    padding: 0 15px 15px;
    font-size: 12px;
    transition: all 0.3s ease;
}

.loading {
    text-align: center;
    padding: 40px;
    font-size: 14px;
    color: #c084fc;
}

/* Torna su mobile */
#tornaSu {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    font-size: 20px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(124,58,237,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
    z-index: 9998;
}

#tornaSu:active {
    transform: scale(0.92);
}

/* ============================================ */
/* STILE DESKTOP (sopra i 768px) */
/* ============================================ */

    .cast-grid, .similar-grid {
        grid-template-columns: repeat(3, 1fr);
    }
    
    .info-grid {

<body>

<div class="topbar">
    <div class="topbar-left">
        <button class="back-btn" onclick="goBack()">⬅️</button>
    </div>
    <div class="topbar-center">
        <h1>📺 KitsuStream</h1>
    </div>
    <div class="topbar-right">
        <button class="list-btn" onclick="goToList()">⭐</button>
    </div>
</div>

<div class="container">
    <div id="tvDetails" class="tv-details">
        <div class="loading">Caricamento...</div>
    </div>
</div>

<!-- PLAYER -->
<div id="playerModal" class="player-modal" onclick="handleOutsideClick(event)">
    <div class="player-box" id="playerBox">
        <iframe id="videoFrame" allowfullscreen></iframe>
        <div class="player-controls">
            <button class="fullscreen-btn" onclick="toggleFullscreen()">🖥 Schermo intero</button>
            <button class="save-btn" onclick="saveCurrentSpot()">💾 Salva posizione</button>
            <button class="reset-btn" onclick="resetSavedSpot()">🗑 Reset</button>
            <button class="close-btn" onclick="closePlayer()">❌ Chiudi</button>
        </div>
        <div id="savedInfo" class="saved-info"></div>
    </div>
</div>

<!-- PULSANTE TORNA SU -->
<button id="tornaSu" title="Torna su">↑</button>

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";
const BACKDROP_BASE = "https://image.tmdb.org/t/p/original";

let tvId = null;
let tvData = null;
let selectedSeason = 1;
let currentVideoUrl = "";

function getTVIdFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
}

async function loadTVDetails() {
    tvId = getTVIdFromURL();
    
    if (!tvId) {
        document.getElementById("tvDetails").innerHTML = '<div class="loading">❌ ID serie TV non valido</div>';
        return;
    }
    
    try {
        const response = await fetch(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${API_KEY}&language=it-IT&append_to_response=credits,similar`);
        const data = await response.json();
        tvData = data;
        
        displayTVDetails(data);
        loadAdditionalInfo(data);
        loadSeasons(data.seasons);
        loadEpisodes(1);
        loadSimilar(data.similar);
        loadCast(data.credits);
        
    } catch (error) {
        console.error("Errore:", error);
        document.getElementById("tvDetails").innerHTML = '<div class="loading">❌ Errore nel caricamento</div>';
    }
}

function displayTVDetails(tv) {
    const posterUrl = tv.poster_path ? IMG_BASE + tv.poster_path : "https://via.placeholder.com/300x450?text=No+Image";
    const backdropUrl = tv.backdrop_path ? BACKDROP_BASE + tv.backdrop_path : "";
    
    const inList = isInList(tv.id);
    
    const html = `
        <div class="tv-header">
            <div class="tv-poster">
                <img src="${posterUrl}" alt="${tv.name}" loading="lazy">
            </div>
            <div class="tv-info">
                <h2 class="tv-title">${escapeHtml(tv.name)}</h2>
                <div class="tv-meta">
                    <span>📅 ${tv.first_air_date ? tv.first_air_date.split("-")[0] : "N/D"}</span>
                    <span>⭐ <span class="rating">${tv.vote_average ? tv.vote_average.toFixed(1) : "N/A"}/10</span></span>
                    <span>🎬 ${tv.number_of_seasons} stagioni</span>
                    <span>📺 ${tv.number_of_episodes} episodi</span>
                </div>
                <div class="genres">
                    ${tv.genres ? tv.genres.map(g => `<span class="genre-tag">${g.name}</span>`).join("") : ""}
                </div>
                <div class="overview">
                    <strong>Trama:</strong><br>
                    ${tv.overview || "Trama non disponibile."}
                </div>
                <div class="watch-buttons">
                    <button class="watch-btn" onclick="playFirstEpisode()">▶ Guarda</button>
                    <button class="list-toggle-btn" id="listBtn" onclick="toggleListFromDetails()">
                        ${inList ? "❌ Rimuovi" : "⭐ Aggiungi"}
                    </button>
                </div>
            </div>
        </div>
    `;
    
    document.getElementById("tvDetails").innerHTML = html;
    
    if (backdropUrl && window.innerWidth > 768) {
        document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url(${backdropUrl})`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundAttachment = "fixed";
    }
}

function loadAdditionalInfo(tv) {
    const infoHtml = `
        <div class="info-section">
            <h3 class="section-title">ℹ️ Informazioni</h3>
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label">Titolo originale</div>
                    <div class="info-value">${escapeHtml(tv.original_name || "N/D")}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Stato</div>
                    <div class="info-value">${tv.status || "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Lingua originale</div>
                    <div class="info-value">${tv.original_language ? tv.original_language.toUpperCase() : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Popolarità</div>
                    <div class="info-value">📊 ${tv.popularity ? Math.round(tv.popularity) : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Produzione</div>
                    <div class="info-value">${tv.production_companies && tv.production_companies[0] ? tv.production_companies[0].name : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Paesi</div>
                    <div class="info-value">${tv.origin_country ? tv.origin_country.join(", ") : "N/D"}</div>
                </div>
            </div>
        </div>
    `;
    
    document.getElementById("tvDetails").insertAdjacentHTML("beforeend", infoHtml);
}

function loadSeasons(seasons) {
    const validSeasons = seasons.filter(s => s.season_number > 0 && s.episode_count > 0);
    
    const seasonsHtml = `
        <div class="seasons-section">
            <h3 class="section-title">📺 Stagioni</h3>
            <div class="seasons-grid">
                ${validSeasons.map(season => `
                    <div class="season-card" onclick="selectSeason(${season.season_number})">
                        <img class="season-poster" src="${season.poster_path ? IMG_BASE + season.poster_path : 'https://via.placeholder.com/300x150?text=Season+' + season.season_number}" alt="Stagione ${season.season_number}" loading="lazy">
                        <div class="season-number">Stagione ${season.season_number}</div>
                        <div class="season-episodes">📺 ${season.episode_count} episodi</div>
                        <div class="season-date">📅 ${season.air_date ? season.air_date.split("-")[0] : "N/D"}</div>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
    
    document.getElementById("tvDetails").insertAdjacentHTML("beforeend", seasonsHtml);
}

async function loadEpisodes(seasonNumber) {
    selectedSeason = seasonNumber;
    
    try {
        const response = await fetch(`https://api.themoviedb.org/3/tv/${tvId}/season/${seasonNumber}?api_key=${API_KEY}&language=it-IT`);
        const seasonData = await response.json();
        
        displayEpisodes(seasonData);
        
    } catch (error) {
        console.error("Errore episodi:", error);
    }
}

function displayEpisodes(seasonData) {
    const existingSection = document.querySelector(".episodes-section");
    if (existingSection) existingSection.remove();
    
    const episodesHtml = `
        <div class="episodes-section">
            <h3 class="section-title">📺 Stagione ${seasonData.season_number}</h3>
            <div class="season-selector">
                <select class="season-select" onchange="changeSeason(this.value)">
                    ${getSeasonOptions()}
                </select>
            </div>
            <div class="episodes-grid">
                ${seasonData.episodes.map(episode => `
                    <div class="episode-card">
                        <div class="episode-number">Episodio ${episode.episode_number}</div>
                        <div class="episode-name">${escapeHtml(episode.name)}</div>
                        <div class="episode-overview">${episode.overview ? episode.overview.substring(0, 100) + "..." : "Descrizione non disponibile"}</div>
                        <div class="episode-meta" style="font-size: 11px; color: #888; margin-top: 8px;">
                            ⏱️ ${episode.runtime ? episode.runtime + " min" : "N/D"} | ⭐ ${episode.vote_average ? episode.vote_average.toFixed(1) : "N/A"}/10
                        </div>
                        <button class="play-episode-btn" onclick="playEpisode(${seasonData.season_number}, ${episode.episode_number})">
                            ▶ Guarda episodio
                        </button>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
    
    document.getElementById("tvDetails").insertAdjacentHTML("beforeend", episodesHtml);
}

function getSeasonOptions() {
    if (!tvData || !tvData.seasons) return "";
    
    const validSeasons = tvData.seasons.filter(s => s.season_number > 0 && s.episode_count > 0);
    
    return validSeasons.map(season => `
        <option value="${season.season_number}" ${selectedSeason == season.season_number ? "selected" : ""}>
            Stagione ${season.season_number} (${season.episode_count} episodi)
        </option>
    `).join("");
}

function changeSeason(seasonNumber) {
    loadEpisodes(parseInt(seasonNumber));
}

function selectSeason(seasonNumber) {
    loadEpisodes(seasonNumber);
    if (window.innerWidth <= 768) {
        document.querySelector(".episodes-section").scrollIntoView({ behavior: "smooth" });
    }
}

function loadSimilar(similar) {
    if (!similar || !similar.results || similar.results.length === 0) return;
    
    const similarShows = similar.results.slice(0, 6);
    
    const similarHtml = `
        <div class="similar-section">
            <h3 class="section-title">📺 Serie simili</h3>
            <div class="similar-grid">
                ${similarShows.map(show => `
                    <div class="similar-card" onclick="openTVPage(${show.id})">
                        <img class="similar-poster" src="${show.poster_path ? IMG_BASE + show.poster_path : 'https://via.placeholder.com/150x225?text=No+Poster'}" alt="${show.name}" loading="lazy">
                        <div class="similar-info">
                            <div class="similar-title">${escapeHtml(show.name)}</div>
                            <div class="similar-year">${show.first_air_date ? show.first_air_date.split("-")[0] : "N/D"} | ⭐ ${show.vote_average ? show.vote_average.toFixed(1) : "N/A"}</div>
                        </div>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
    
    document.getElementById("tvDetails").insertAdjacentHTML("beforeend", similarHtml);
}

function loadCast(credits) {
    if (!credits || !credits.cast || credits.cast.length === 0) return;
    
    const mainCast = credits.cast.slice(0, 8);
    
    const castHtml = `
        <div class="cast-section">
            <h3 class="section-title">🎭 Cast</h3>
            <div class="cast-grid">
                ${mainCast.map(actor => `
                    <div class="cast-card">
                        <img class="cast-photo" src="${actor.profile_path ? IMG_BASE + actor.profile_path : 'https://via.placeholder.com/150x150?text=No+Photo'}" alt="${actor.name}" loading="lazy">
                        <div class="cast-name">${escapeHtml(actor.name)}</div>
                        <div class="cast-character">${escapeHtml(actor.character)}</div>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
    
    document.getElementById("tvDetails").insertAdjacentHTML("beforeend", castHtml);
}

function openTVPage(id) {
    window.location.href = `tv.html?id=${id}`;
}

function playEpisode(season, episode) {
    const url = `https://vixsrc.to/tv/${tvId}/${season}/${episode}?lang=it`;
    openPlayer(url);
}

function playFirstEpisode() {
    if (tvData && tvData.seasons) {
        const firstSeason = tvData.seasons.find(s => s.season_number === 1 && s.episode_count > 0);
        if (firstSeason) {
            playEpisode(1, 1);
        } else {
            alert("Primo episodio non disponibile");
        }
    }
}

function getList() {
    return JSON.parse(localStorage.getItem("myMediaList")) || [];
}

function saveList(list) {
    localStorage.setItem("myMediaList", JSON.stringify(list));
}

function isInList(id) {
    return getList().some(item => item.id === id && item.type === "tv");
}

function toggleListFromDetails() {
    if (!tvData) return;
    
    let list = getList();
    const exists = list.find(item => item.id === tvData.id && item.type === "tv");
    
    if (exists) {
        list = list.filter(item => !(item.id === tvData.id && item.type === "tv"));
    } else {
        list.push({
            id: tvData.id,
            title: tvData.name,
            poster: tvData.poster_path ? IMG_BASE + tvData.poster_path : "",
            rating: tvData.vote_average,
            year: tvData.first_air_date ? tvData.first_air_date.split("-")[0] : "N/D",
            type: "tv",
            mediaType: "Serie TV",
            seasons: tvData.number_of_seasons
        });
    }
    
    saveList(list);
    
    const btn = document.getElementById("listBtn");
    const nowInList = !exists;
    btn.innerHTML = nowInList ? "❌ Rimuovi" : "⭐ Aggiungi";
    btn.style.background = nowInList ? "#ef4444" : "#7c3aed";
}

/* FUNZIONI SALVATAGGIO POSIZIONE */
/* ============================================ */

function formatTime(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    
    if (h > 0) {
        return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    } else {
        return `${m}:${s.toString().padStart(2, '0')}`;
    }
}

function parseTimeInput(input) {
    // Rimuove spazi e sostituisce virgole con punti
    input = input.trim().replace(',', '.');
    
    // Formato con ore:minuti:secondi (es: 1:30:15)
    if (input.includes(':') && input.split(':').length === 3) {
        const parts = input.split(':');
        const ore = parseInt(parts[0]);
        const minuti = parseInt(parts[1]);
        const secondi = parseInt(parts[2]);
        
        if (!isNaN(ore) && !isNaN(minuti) && !isNaN(secondi) && ore >= 0 && minuti >= 0 && minuti < 60 && secondi >= 0 && secondi < 60) {
            return { success: true, seconds: (ore * 3600) + (minuti * 60) + secondi };
        }
    }
    // Formato con ore:minuti (es: 1:30)
    else if (input.includes(':') && input.split(':').length === 2) {
        const parts = input.split(':');
        const ore = parseInt(parts[0]);
        const minuti = parseInt(parts[1]);
        
        if (!isNaN(ore) && !isNaN(minuti) && ore >= 0 && minuti >= 0 && minuti < 60) {
            return { success: true, seconds: (ore * 3600) + (minuti * 60) };
        }
    }
    // Formato con minuti decimali (es: 15.30)
    else if (input.includes('.')) {
        let minuti = parseFloat(input);
        if (!isNaN(minuti) && minuti >= 0) {
            return { success: true, seconds: Math.floor(minuti * 60) };
        }
    }
    // Formato con solo minuti (es: 15)
    else {
        let minuti = parseFloat(input);
        if (!isNaN(minuti) && minuti >= 0) {
            return { success: true, seconds: Math.floor(minuti * 60) };
        }
    }
    
    return { success: false, seconds: 0 };
}

function saveCurrentSpot() {
    if (!currentVideoUrl) {
        alert("⚠️ Apri prima un video!");
        return;
    }
    
    const helpText = "Formati supportati:\n\n" +
                     "• Minuti: 15.30 (15 minuti e 30 secondi)\n" +
                     "• Ore:Minuti: 1:30 (1 ora e 30 minuti)\n" +
                     "• Ore:Minuti:Secondi: 1:30:15\n\n" +
                     "Esempi: 15.30, 1:30, 1:30:15";
    
    const input = prompt("A che punto sei?\n\n" + helpText);
    
    if (input === null) return;
    
    const result = parseTimeInput(input);
    
    if (!result.success) {
        alert("❌ Formato non valido!\n\n" + helpText);
        return;
    }
    
    const secondi = result.seconds;
    localStorage.setItem(`time_tv_${currentVideoUrl}`, secondi);
    
    const savedInfo = document.getElementById("savedInfo");
    const timeString = formatTime(secondi);
    savedInfo.innerHTML = `✅ Salvato! Riprenderò da ${timeString}`;
    savedInfo.style.color = "#4ade80";
    
    setTimeout(() => {
        if (document.getElementById("playerModal").style.display === "flex") {
            savedInfo.innerHTML = `📌 Posizione salvata: ${timeString}`;
            savedInfo.style.color = "#f59e0b";
        }
    }, 3000);
    
    alert(`✅ Posizione salvata: ${timeString}`);
}

function resetSavedSpot() {
    if (!currentVideoUrl) {
        alert("⚠️ Apri prima un video!");
        return;
    }
    
    const savedTime = localStorage.getItem(`time_tv_${currentVideoUrl}`);
    if (!savedTime) {
        alert("⚠️ Nessun salvataggio trovato per questo video!");
        return;
    }
    
    if (confirm("Sei sicuro di voler cancellare la posizione salvata?")) {
        localStorage.removeItem(`time_tv_${currentVideoUrl}`);
        
        const savedInfo = document.getElementById("savedInfo");
        savedInfo.innerHTML = `🗑 Salvataggio rimosso! Il video ripartirà dall'inizio`;
        savedInfo.style.color = "#ef4444";
        
        setTimeout(() => {
            if (document.getElementById("playerModal").style.display === "flex") {
                savedInfo.innerHTML = `🎬 Nessun salvataggio - riparto dall'inizio`;
                savedInfo.style.color = "#888";
            }
        }, 3000);
        
        alert("✅ Posizione cancellata!");
    }
}

function openPlayer(url) {
    const modal = document.getElementById("playerModal");
    const frame = document.getElementById("videoFrame");
    
    currentVideoUrl = url;
    const savedTime = localStorage.getItem(`time_tv_${url}`);
    let finalUrl = url;
    let savedInfo = document.getElementById("savedInfo");
    
    if (savedTime && parseInt(savedTime) > 0) {
        const secondi = parseInt(savedTime);
        const timeString = formatTime(secondi);
        finalUrl += `&startAt=${secondi}`;
        savedInfo.innerHTML = `📌 Riprenderò da ${timeString}`;
        savedInfo.style.color = "#f59e0b";
    } else {
        savedInfo.innerHTML = `🎬 Nessun salvataggio - riparto dall'inizio`;
        savedInfo.style.color = "#888";
    }
    
    frame.src = finalUrl;
    modal.style.display = "flex";
}

function closePlayer() {
    const frame = document.getElementById("videoFrame");
    frame.src = "";
    document.getElementById("playerModal").style.display = "none";
    document.getElementById("savedInfo").innerHTML = "";
    currentVideoUrl = "";
    
    if (document.fullscreenElement) {
        document.exitFullscreen();
    }
}

function handleOutsideClick(e) {
    const box = document.getElementById("playerBox");
    if (!box.contains(e.target)) closePlayer();
}

function toggleFullscreen() {
    const box = document.getElementById("playerBox");
    if (!document.fullscreenElement) {
        box.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

function goBack() {
    window.history.back();
}

function goToList() {
    window.location.href = "list.html";
}

function escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>La mia lista</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    background-attachment: fixed;
    color: white;
}

/* TOPBAR */
.topbar {
    display: flex;
    align-items: center;
    padding: 20px 30px;
}

.topbar-left,
.topbar-right {
    width: 120px;
}

.topbar-center {
    flex: 1;
    text-align: center;
}

h2 {
    margin: 0;
    color: #c084fc;
    text-shadow: 0 0 10px rgba(168,85,247,0.6);
}

/* BUTTON */
button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #7c3aed;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 15px rgba(168,85,247,0.8);
    transform: translateY(-2px);
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

/* GRID */
.grid {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: #1f1b3a;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(168,85,247,0.8);
}

.card img {
    width: 100%;
    height: 270px;
    object-fit: cover;
    cursor: pointer;
}

.card-content {
    padding: 10px;
}

.card h4 {
    margin: 5px 0;
    font-size: 14px;
}

/* LINK APRI */
.card a {
    color: #00d4ff;
    text-decoration: none;
    font-size: 12px;
}

.card a:hover {
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left"></div>

    <div class="topbar-center">
        <h2>⭐ La mia lista</h2>
    </div>

    <div class="topbar-right" style="text-align:right;">
        <button onclick="goBack()">⬅ Indietro</button>
    </div>
</div>

<div class="container">
    <div id="list" class="grid"></div>
</div>

<script>
function goBack() {
    window.location.href = "index.html";
}

function getList() {
    return JSON.parse(localStorage.getItem("myMovies")) || [];
}

function saveList(list) {
    localStorage.setItem("myMovies", JSON.stringify(list));
}

function removeMovie(id) {
    let list = getList().filter(m => m.id !== id);
    saveList(list);
    renderList();
}

/* 👉 NUOVA FUNZIONE CLICK LOCANDINA */
function openMoviePage(id) {
    window.location.href = "movie.html?id=" + id;
}

function renderList() {
    const container = document.getElementById("list");
    const list = getList();

    container.innerHTML = "";

    if (list.length === 0) {
        container.innerHTML = "<p>Nessun film salvato</p>";
        return;
    }

    list.forEach(movie => {
        const link = `https://vixsrc.to/movie/${movie.id}?lang=it`;

        container.innerHTML += `
            <div class="card">

                <img src="${movie.poster}" onclick="openMoviePage(${movie.id})">

                <div class="card-content">
                    <h4>${movie.title}</h4>

                    <a href="${link}" target="_blank">▶ Apri</a><br>

                    <button onclick="removeMovie(${movie.id})">
                        ❌ Rimuovi
                    </button>
                </div>

            </div>
        `;
    });
}

renderList();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KitsuStream - La mia lista</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    min-height: 100vh;
}

/* ============================================ */
/* STILE MOBILE (default - fino a 768px) */
/* ============================================ */

/* Topbar mobile */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left, .topbar-right {
    width: auto;
}

.topbar-center {
    flex: 1;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.back-btn, .clear-all-btn {
    background: rgba(124, 58, 237, 0.9);
    border: none;
    padding: 6px 12px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s ease;
}

.back-btn:active, .clear-all-btn:active {
    transform: scale(0.95);
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 16px;
}

/* Titolo lista mobile */
.lista-title {
    text-align: center;
    margin-bottom: 20px;
}

.lista-title h2 {
    font-size: 20px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: inline-block;
}

.lista-title p {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
}

/* Filtri e ordinamento mobile */
.filters-bar {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 16px;
}

.filter-group {
    margin-bottom: 10px;
}

.filter-label {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
    display: block;
}

.sort-buttons, .type-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.sort-btn, .type-btn, .genre-filter-btn {
    background: rgba(124, 58, 237, 0.4);
    border: 1px solid rgba(124, 58, 237, 0.5);
    padding: 5px 10px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.2s ease;
}

.sort-btn.active, .type-btn.active, .genre-filter-btn.active {
    background: #7c3aed;
    border-color: #7c3aed;
}

.sort-btn:active, .type-btn:active, .genre-filter-btn:active {
    transform: scale(0.95);
}

.genre-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 6px;
    max-height: 100px;
    overflow-y: auto;
}

.stats {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

/* Grid mobile: 2 colonne */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 0;
}

.card {
    background: rgba(31, 27, 58, 0.6);
    border-radius: 12px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    transition: transform 0.2s ease;
}

.card:active {
    transform: scale(0.98);
}

.card img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    cursor: pointer;
}

.card-content {
    padding: 8px;
}

.card h4 {
    margin: 0 0 3px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.media-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 9px;
    font-weight: 600;
    margin-bottom: 6px;
}

.badge-movie {
    background: #7c3aed;
}

.badge-tv {
    background: #ef4444;
}

.card p {
    font-size: 9px;
    color: #c084fc;
    margin-bottom: 3px;
}

.card button {
    padding: 6px 0;
    border: none;
    border-radius: 8px;
    background: #ef4444;
    color: white;
    cursor: pointer;
    font-size: 10px;
    font-weight: 500;
    width: 100%;
    margin-top: 6px;
}

.card button:active {
    opacity: 0.8;
}

.empty-state {
    text-align: center;
    padding: 50px 20px;
    font-size: 13px;
    color: #888;
}

/* PULSANTE TORNA SU mobile */
#tornaSu {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    font-size: 20px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(124,58,237,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
    z-index: 9998;
}

#tornaSu:active {
    transform: scale(0.92);
}

/* ============================================ */
/* STILE DESKTOP (sopra i 768px) */
/* ============================================ */

@media (min-width: 769px) {
    
    /* Topbar desktop */
    .topbar {
        padding: 20px 40px;
        background: rgba(0,0,0,0.3);
    }
    
    .topbar-left, .topbar-right {
        width: 140px;
    }
    
    .topbar-center {
        flex: 1;
        text-align: center;
    }
    
    h1 {
        font-size: 28px;
    }
    
    .back-btn, .clear-all-btn {
        padding: 10px 20px;
        font-size: 14px;
        transition: all 0.2s ease;
    }
    
    .back-btn:hover, .clear-all-btn:hover {
        transform: translateY(-2px);
        background: #7c3aed;
    }
    
    .container {
        padding: 30px;
    }
    
    /* Titolo lista desktop */
    .lista-title {
        margin-bottom: 30px;
    }
    
    .lista-title h2 {
        font-size: 28px;
    }
    
    .lista-title p {
        font-size: 14px;
    }
    
    /* Filtri desktop */
    .filters-bar {
        padding: 20px;
        margin-bottom: 30px;
        border-radius: 20px;
    }
    
    .filter-group {
        margin-bottom: 15px;
    }
    
    .filter-label {
        font-size: 13px;
        margin-bottom: 10px;
    }
    
    .sort-btn, .type-btn, .genre-filter-btn {
        padding: 8px 16px;
        font-size: 13px;
    }
    
    .sort-btn:hover, .type-btn:hover, .genre-filter-btn:hover {
        background: rgba(124, 58, 237, 0.6);
        transform: translateY(-1px);
    }
    
    .genre-filters {
        max-height: 120px;
        gap: 10px;
    }
    
    .stats {
        font-size: 13px;
        margin-top: 15px;
        padding-top: 12px;
    }
    
    /* Grid desktop: 5 colonne */
    .grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 25px;
    }
    
    .card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .card-content {
        padding: 15px;
    }
    
    .card h4 {
        font-size: 14px;
        margin: 5px 0;
    }
    
    .media-badge {
        padding: 3px 10px;
        font-size: 10px;
        margin-bottom: 8px;
    }
    
    .card p {
        font-size: 11px;
        margin-bottom: 5px;
    }
    
    .card button {
        padding: 8px 12px;
        font-size: 12px;
        margin-top: 8px;
        transition: all 0.2s ease;
    }
    
    .card button:hover {
        opacity: 0.9;
        transform: scale(0.98);
    }
    
    .empty-state {
        padding: 80px;
        font-size: 18px;
    }
    
    /* Torna su desktop */
    #tornaSu {
        bottom: 30px;
        right: 30px;
        width: 50px;
        height: 50px;
        font-size: 24px;
        transition: 0.3s;
    }
    
    #tornaSu:hover {
        transform: translateY(-5px);
        background: linear-gradient(135deg, #a855f7, #c084fc);
        box-shadow: 0 6px 20px rgba(124,58,237,0.8);
    }
}

/* Tablet (769px - 1024px) */
@media (min-width: 769px) and (max-width: 1024px) {
    .grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }
}

/* Desktop grande */
@media (min-width: 1400px) {
    .grid {
        grid-template-columns: repeat(6, 1fr);
    }
}

/* Animazioni */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.card {
    animation: fadeIn 0.3s ease;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left">
        <button class="back-btn" onclick="goBack()">⬅️</button>
    </div>
    <div class="topbar-center">
        <h1>🎬 KitsuStream</h1>
    </div>
    <div class="topbar-right">
        <button class="clear-all-btn" onclick="clearAll()">🗑 Svuota</button>
    </div>
</div>

<div class="container">
    <div class="lista-title">
        <h2>⭐ La mia lista</h2>
        <p>I tuoi film e serie TV preferiti</p>
    </div>

    <!-- Barra filtri e ordinamento -->
    <div class="filters-bar">
        <div class="filter-group">
            <div class="filter-label">📋 Ordina per:</div>
            <div class="sort-buttons">
                <button class="sort-btn active" data-sort="date" onclick="changeSort('date')">📅 Data</button>
                <button class="sort-btn" data-sort="rating" onclick="changeSort('rating')">⭐ Voto</button>
                <button class="sort-btn" data-sort="title" onclick="changeSort('title')">🔤 Titolo</button>
            </div>
        </div>

        <div class="filter-group">
            <div class="filter-label">🎬 Tipo:</div>
            <div class="type-buttons">
                <button class="type-btn active" data-type="all" onclick="filterByType('all')">Tutti</button>
                <button class="type-btn" data-type="movie" onclick="filterByType('movie')">🎬 Film</button>
                <button class="type-btn" data-type="tv" onclick="filterByType('tv')">📺 Serie TV</button>
            </div>
        </div>

        <div class="filter-group">
            <div class="filter-label">🎭 Filtra per genere:</div>
            <div class="genre-filters" id="genreFilters">
                <!-- I generi vengono caricati dinamicamente -->
            </div>
        </div>

        <div class="stats" id="stats">
            <!-- Statistiche -->
        </div>
    </div>

    <div id="listContainer"></div>
</div>

<button id="tornaSu" title="Torna su">↑</button>

<script>
// Lista dei generi disponibili
const availableGenres = [
    { id: "action", name: "Azione", type: "both" },
    { id: "adventure", name: "Avventura", type: "both" },
    { id: "animation", name: "Animazione", type: "both" },
    { id: "comedy", name: "Commedia", type: "both" },
    { id: "crime", name: "Crime", type: "both" },
    { id: "documentary", name: "Documentario", type: "both" },
    { id: "drama", name: "Dramma", type: "both" },
    { id: "family", name: "Famiglia", type: "both" },
    { id: "fantasy", name: "Fantasy", type: "both" },
    { id: "history", name: "Storico", type: "both" },
    { id: "horror", name: "Horror", type: "both" },
    { id: "music", name: "Musica", type: "both" },
    { id: "mystery", name: "Mistero", type: "both" },
    { id: "romance", name: "Romance", type: "both" },
    { id: "scifi", name: "Fantascienza", type: "both" },
    { id: "thriller", name: "Thriller", type: "both" },
    { id: "war", name: "Guerra", type: "both" },
    { id: "western", name: "Western", type: "both" }
];

let currentSort = "date";
let currentTypeFilter = "all";
let currentGenreFilters = [];

function getList() {
    return JSON.parse(localStorage.getItem("myMediaList")) || [];
}

function saveList(list) {
    localStorage.setItem("myMediaList", JSON.stringify(list));
}

function changeSort(sort) {
    currentSort = sort;
    document.querySelectorAll(".sort-btn").forEach(btn => btn.classList.remove("active"));
    document.querySelector(`.sort-btn[data-sort="${sort}"]`).classList.add("active");
    displayList();
}

function filterByType(type) {
    currentTypeFilter = type;
    document.querySelectorAll(".type-btn").forEach(btn => btn.classList.remove("active"));
    document.querySelector(`.type-btn[data-type="${type}"]`).classList.add("active");
    displayList();
}

function toggleGenreFilter(genreId) {
    const index = currentGenreFilters.indexOf(genreId);
    if (index === -1) {
        currentGenreFilters.push(genreId);
    } else {
        currentGenreFilters.splice(index, 1);
    }
    
    // Aggiorna stile bottone
    const btn = document.querySelector(`.genre-filter-btn[data-genre="${genreId}"]`);
    if (btn) {
        btn.classList.toggle("active");
    }
    
    displayList();
}

function renderGenreFilters() {
    const container = document.getElementById("genreFilters");
    container.innerHTML = availableGenres.map(genre => `
        <button class="genre-filter-btn" data-genre="${genre.id}" onclick="toggleGenreFilter('${genre.id}')">
            ${genre.name}
        </button>
    `).join("");
}

function sortItems(items) {
    const sorted = [...items];
    switch(currentSort) {
        case "rating":
            sorted.sort((a, b) => (b.rating || 0) - (a.rating || 0));
            break;
        case "title":
            sorted.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
            break;
        case "date":
        default:
            sorted.sort((a, b) => (b.year || 0) - (a.year || 0));
            break;
    }
    return sorted;
}

function filterItems(items) {
    let filtered = [...items];
    
    // Filtra per tipo
    if (currentTypeFilter !== "all") {
        filtered = filtered.filter(item => item.type === currentTypeFilter);
    }
    
    // Filtra per genere (nota: i generi sono simulati, nella realtà andrebbero presi dall'API)
    if (currentGenreFilters.length > 0) {
        // Per ora filtriamo per titolo (simulazione)
        // In un'implementazione reale, ogni item avrebbe un array di generi
        filtered = filtered.filter(item => {
            // Simulazione: se il titolo contiene parole chiave del genere
            const titleLower = (item.title || "").toLowerCase();
            return currentGenreFilters.some(genre => {
                const genreName = availableGenres.find(g => g.id === genre)?.name.toLowerCase() || "";
                return titleLower.includes(genreName) || 
                       (item.mediaType === "Film" && genre === "movie") ||
                       (item.mediaType === "Serie TV" && genre === "tv");
            });
        });
    }
    
    return filtered;
}

function updateStats(filteredItems, totalItems) {
    const statsDiv = document.getElementById("stats");
    const moviesCount = filteredItems.filter(i => i.type === "movie").length;
    const tvCount = filteredItems.filter(i => i.type === "tv").length;
    const avgRating = filteredItems.length > 0 
        ? (filteredItems.reduce((sum, i) => sum + (i.rating || 0), 0) / filteredItems.length).toFixed(1)
        : 0;
    
    statsDiv.innerHTML = `📊 Mostrati ${filteredItems.length} su ${totalItems} totali | 🎬 Film: ${moviesCount} | 📺 Serie: ${tvCount} | ⭐ Media voto: ${avgRating}`;
}

function displayList() {
    const list = getList();
    const container = document.getElementById("listContainer");
    
    if (list.length === 0) {
        container.innerHTML = '<div class="empty-state">📭 La tua lista è vuota<br>Aggiungi film o serie TV dalla home!</div>';
        updateStats([], 0);
        return;
    }
    
    let filtered = filterItems(list);
    const totalItems = list.length;
    const sorted = sortItems(filtered);
    
    updateStats(filtered, totalItems);
    
    if (sorted.length === 0) {
        container.innerHTML = '<div class="empty-state">😕 Nessun elemento corrisponde ai filtri selezionati</div>';
        return;
    }
    
    container.innerHTML = `
        <div class="grid">
            ${sorted.map(item => `
                <div class="card">
                    <img src="${item.poster || 'https://via.placeholder.com/500x750'}" 
                         alt="${item.title}" 
                         onclick="openDetails(${item.id}, '${item.type}')"
                         loading="lazy">
                    <div class="card-content">
                        <span class="media-badge ${item.type === 'movie' ? 'badge-movie' : 'badge-tv'}">
                            ${item.mediaType || (item.type === 'movie' ? 'Film' : 'Serie TV')}
                        </span>
                        <h4>${escapeHtml(item.title)}</h4>
                        <p>⭐ ${item.rating || "N/A"}/10</p>
                        <p>📅 ${item.year || "N/D"}</p>
                        ${item.seasons ? `<p>📺 ${item.seasons} stagioni</p>` : ''}
                        <button onclick="removeFromList(${item.id}, '${item.type}')">❌ Rimuovi</button>
                    </div>
                </div>
            `).join("")}
        </div>
    `;
}

function openDetails(id, type) {
    window.location.href = `${type === 'movie' ? 'movie' : 'tv'}.html?id=${id}`;
}

function removeFromList(id, type) {
    let list = getList();
    list = list.filter(item => !(item.id === id && item.type === type));
    saveList(list);
    displayList();
}

function clearAll() {
    if (confirm("⚠️ Sei sicuro di voler svuotare tutta la lista?")) {
        saveList([]);
        displayList();
    }
}

function goBack() {
    window.history.back();
}

function escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

/* TORNA SU */
const tornaSuBtn = document.getElementById("tornaSu");

window.addEventListener("scroll", function() {
    if (window.scrollY > 300) {
        tornaSuBtn.style.display = "flex";
    } else {
        tornaSuBtn.style.display = "none";
    }
});

tornaSuBtn.addEventListener("click", function() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
});

// Inizializzazione
renderGenreFilters();
displayList();
</script>

</body>
</html>

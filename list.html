<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>KitsuStream - La mia lista</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
}

.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 30px;
    position: relative;
}

.topbar-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
}

h2 {
    margin: 0;
    font-size: 28px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 20px rgba(124,58,237,0.3);
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

.card {
    background: rgba(31, 27, 58, 0.7);
    border-radius: 15px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    transition: transform 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    cursor: pointer;
}

.card-content {
    padding: 15px;
}

.card h4 {
    margin: 5px 0;
    font-size: 14px;
}

.media-badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 10px;
    margin-bottom: 8px;
}

.badge-movie {
    background: #7c3aed;
}

.badge-tv {
    background: #ef4444;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #ef4444;
    color: white;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
}

.empty-state {
    text-align: center;
    padding: 60px;
    font-size: 18px;
    color: #888;
}

.back-btn, .clear-all-btn {
    background: #7c3aed;
    padding: 10px 20px;
    border-radius: 25px;
    width: auto;
}

.top-actions {
    display: flex;
    justify-content: space-between;
    margin-bottom: 30px;
}

/* PULSANTE TORNA SU */
#tornaSu {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    font-size: 24px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(124,58,237,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    z-index: 9998;
}

#tornaSu:hover {
    transform: translateY(-5px);
    background: linear-gradient(135deg, #a855f7, #c084fc);
    box-shadow: 0 6px 20px rgba(124,58,237,0.8);
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left"></div>
    <div class="topbar-center">
        <h2>⭐ La mia lista</h2>
    </div>
    <div class="topbar-right"></div>
</div>

<div class="container">
    <div class="top-actions">
        <button class="back-btn" onclick="goBack()">⬅ Torna indietro</button>
        <button class="clear-all-btn" onclick="clearAll()">🗑 Svuota lista</button>
    </div>

    <div id="listContainer"></div>
</div>

<button id="tornaSu" title="Torna su">↑</button>

<script>
function getList() {
    return JSON.parse(localStorage.getItem("myMediaList")) || [];
}

function saveList(list) {
    localStorage.setItem("myMediaList", JSON.stringify(list));
    displayList();
}

function displayList() {
    const list = getList();
    const container = document.getElementById("listContainer");
    
    if (list.length === 0) {
        container.innerHTML = '<div class="empty-state">📭 La tua lista è vuota<br>Aggiungi film o serie TV dalla home!</div>';
        return;
    }
    
    container.innerHTML = `
        <div class="grid">
            ${list.map(item => `
                <div class="card">
                    <img src="${item.poster || 'https://via.placeholder.com/500x750'}" 
                         alt="${item.title}" 
                         onclick="openDetails(${item.id}, '${item.type}')">
                    <div class="card-content">
                        <span class="media-badge ${item.type === 'movie' ? 'badge-movie' : 'badge-tv'}">
                            ${item.mediaType || (item.type === 'movie' ? 'Film' : 'Serie TV')}
                        </span>
                        <h4>${escapeHtml(item.title)}</h4>
                        <p>⭐ ${item.rating || "N/A"}/10</p>
                        <p>📅 ${item.year || "N/D"}</p>
                        ${item.seasons ? `<p>📺 ${item.seasons} stagioni</p>` : ''}
                        <button onclick="removeFromList(${item.id}, '${item.type}')">❌ Rimuovi</button>
                    </div>
                </div>
            `).join("")}
        </div>
    `;
}

function openDetails(id, type) {
    window.location.href = `${type === 'movie' ? 'movie' : 'tv'}.html?id=${id}`;
}

function removeFromList(id, type) {
    let list = getList();
    list = list.filter(item => !(item.id === id && item.type === type));
    saveList(list);
}

function clearAll() {
    if (confirm("⚠️ Sei sicuro di voler svuotare tutta la lista?")) {
        saveList([]);
    }
}

function goBack() {
    window.history.back();
}

function escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

/* TORNA SU */
const tornaSuBtn = document.getElementById("tornaSu");

window.addEventListener("scroll", function() {
    if (window.scrollY > 300) {
        tornaSuBtn.style.display = "flex";
    } else {
        tornaSuBtn.style.display = "none";
    }
});

tornaSuBtn.addEventListener("click", function() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
});

displayList();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KitsuStream - La mia lista</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    min-height: 100vh;
}

/* ============================================ */
/* STILE MOBILE (default - fino a 768px) */
/* ============================================ */

/* Topbar mobile */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left, .topbar-right {
    width: auto;
}

.topbar-center {
    flex: 1;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.subtitle {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
    letter-spacing: 0.5px;
}

.back-btn, .clear-all-btn {
    background: rgba(124, 58, 237, 0.9);
    border: none;
    padding: 6px 12px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s ease;
}

.back-btn:active, .clear-all-btn:active {
    transform: scale(0.95);
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 16px;
}

/* Grid mobile: 2 colonne */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 0;
}

.card {
    background: rgba(31, 27, 58, 0.6);
    border-radius: 12px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    transition: transform 0.2s ease;
}

.card:active {
    transform: scale(0.98);
}

.card img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    cursor: pointer;
}

.card-content {
    padding: 8px;
}

.card h4 {
    margin: 0 0 3px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.media-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 9px;
    font-weight: 600;
    margin-bottom: 6px;
}

.badge-movie {
    background: #7c3aed;
}

.badge-tv {
    background: #ef4444;
}

.card p {
    font-size: 9px;
    color: #c084fc;
    margin-bottom: 3px;
}

.card button {
    padding: 6px 0;
    border: none;
    border-radius: 8px;
    background: #ef4444;
    color: white;
    cursor: pointer;
    font-size: 10px;
    font-weight: 500;
    width: 100%;
    margin-top: 6px;
}

.card button:active {
    opacity: 0.8;
}

.empty-state {
    text-align: center;
    padding: 50px 20px;
    font-size: 13px;
    color: #888;
}

/* PULSANTE TORNA SU mobile */
#tornaSu {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    font-size: 20px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(124,58,237,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
    z-index: 9998;
}

#tornaSu:active {
    transform: scale(0.92);
}

/* ============================================ */
/* STILE DESKTOP (sopra i 768px) */
/* ============================================ */

@media (min-width: 769px) {
    
    /* Topbar desktop */
    .topbar {
        padding: 20px 40px;
        background: rgba(0,0,0,0.3);
    }
    
    .topbar-left, .topbar-right {
        width: 140px;
    }
    
    .topbar-center {
        flex: 1;
        text-align: center;
    }
    
    h1 {
        font-size: 28px;
    }
    
    .subtitle {
        font-size: 14px;
        margin-top: 4px;
    }
    
    .back-btn, .clear-all-btn {
        padding: 10px 20px;
        font-size: 14px;
        transition: all 0.2s ease;
    }
    
    .back-btn:hover, .clear-all-btn:hover {
        transform: translateY(-2px);
        background: #7c3aed;
    }
    
    .container {
        padding: 30px;
    }
    
    /* Grid desktop: 5 colonne */
    .grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 25px;
    }
    
    .card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .card-content {
        padding: 15px;
    }
    
    .card h4 {
        font-size: 14px;
        margin: 5px 0;
    }
    
    .media-badge {
        padding: 3px 10px;
        font-size: 10px;
        margin-bottom: 8px;
    }
    
    .card p {
        font-size: 11px;
        margin-bottom: 5px;
    }
    
    .card button {
        padding: 8px 12px;
        font-size: 12px;
        margin-top: 8px;
        transition: all 0.2s ease;
    }
    
    .card button:hover {
        opacity: 0.9;
        transform: scale(0.98);
    }
    
    .empty-state {
        padding: 80px;
        font-size: 18px;
    }
    
    /* Torna su desktop */
    #tornaSu {
        bottom: 30px;
        right: 30px;
        width: 50px;
        height: 50px;
        font-size: 24px;
        transition: 0.3s;
    }
    
    #tornaSu:hover {
        transform: translateY(-5px);
        background: linear-gradient(135deg, #a855f7, #c084fc);
        box-shadow: 0 6px 20px rgba(124,58,237,0.8);
    }
}

/* Tablet (769px - 1024px) */
@media (min-width: 769px) and (max-width: 1024px) {
    .grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }
}

/* Desktop grande */
@media (min-width: 1400px) {
    .grid {
        grid-template-columns: repeat(6, 1fr);
    }
}

/* Animazioni */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.card {
    animation: fadeIn 0.3s ease;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left">
        <button class="back-btn" onclick="goBack()">⬅️</button>
    </div>
    <div class="topbar-center">
        <h1>🎬 KitsuStream</h1>
        <div class="subtitle">⭐ La mia lista</div>
    </div>
    <div class="topbar-right">
        <button class="clear-all-btn" onclick="clearAll()">🗑 Svuota</button>
    </div>
</div>

<div class="container">
    <div id="listContainer"></div>
</div>

<button id="tornaSu" title="Torna su">↑</button>

<script>
function getList() {
    return JSON.parse(localStorage.getItem("myMediaList")) || [];
}

function saveList(list) {
    localStorage.setItem("myMediaList", JSON.stringify(list));
    displayList();
}

function displayList() {
    const list = getList();
    const container = document.getElementById("listContainer");
    
    if (list.length === 0) {
        container.innerHTML = '<div class="empty-state">📭 La tua lista è vuota<br>Aggiungi film o serie TV dalla home!</div>';
        return;
    }
    
    container.innerHTML = `
        <div class="grid">
            ${list.map(item => `
                <div class="card">
                    <img src="${item.poster || 'https://via.placeholder.com/500x750'}" 
                         alt="${item.title}" 
                         onclick="openDetails(${item.id}, '${item.type}')"
                         loading="lazy">
                    <div class="card-content">
                        <span class="media-badge ${item.type === 'movie' ? 'badge-movie' : 'badge-tv'}">
                            ${item.mediaType || (item.type === 'movie' ? 'Film' : 'Serie TV')}
                        </span>
                        <h4>${escapeHtml(item.title)}</h4>
                        <p>⭐ ${item.rating || "N/A"}/10</p>
                        <p>📅 ${item.year || "N/D"}</p>
                        ${item.seasons ? `<p>📺 ${item.seasons} stagioni</p>` : ''}
                        <button onclick="removeFromList(${item.id}, '${item.type}')">❌ Rimuovi</button>
                    </div>
                </div>
            `).join("")}
        </div>
    `;
}

function openDetails(id, type) {
    window.location.href = `${type === 'movie' ? 'movie' : 'tv'}.html?id=${id}`;
}

function removeFromList(id, type) {
    let list = getList();
    list = list.filter(item => !(item.id === id && item.type === type));
    saveList(list);
}

function clearAll() {
    if (confirm("⚠️ Sei sicuro di voler svuotare tutta la lista?")) {
        saveList([]);
    }
}

function goBack() {
    window.history.back();
}

function escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

/* TORNA SU */
const tornaSuBtn = document.getElementById("tornaSu");

window.addEventListener("scroll", function() {
    if (window.scrollY > 300) {
        tornaSuBtn.style.display = "flex";
    } else {
        tornaSuBtn.style.display = "none";
    }
});

tornaSuBtn.addEventListener("click", function() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
});

displayList();
</script>

</body>
</html>

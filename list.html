<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>La mia lista</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    background-attachment: fixed;
    color: white;
}

/* TOPBAR */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 30px;
    position: relative;
}

.topbar-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.top-actions {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

h2.title-purple {
    margin: 0;
    color: #c084fc;
    text-shadow: 0 0 10px rgba(168,85,247,0.6);
}

h2.title-gradient {
    margin: 0;
    font-size: 28px;
    font-weight: bold;

    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow: 0 0 20px rgba(124,58,237,0.3);
}

/* BUTTON */
button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #7c3aed;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 15px rgba(168,85,247,0.8);
    transform: translateY(-2px);
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

/* GRID */
.grid {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: #1f1b3a;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(168,85,247,0.8);
}

.card img {
    width: 100%;
    height: 270px;
    object-fit: cover;
    cursor: pointer;
}

.card-content {
    padding: 10px;
}

.card h4 {
    margin: 5px 0;
    font-size: 14px;
}

/* PLAYER */
.player-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.player-box {
    width: 90%;
    max-width: 1000px;
}

.player-box iframe {
    width: 100%;
    height: 500px;
    border: none;
    border-radius: 10px;
}

.player-controls {
    margin-top: 10px;
    display: flex;
    justify-content: center;
}

.close-btn {
    background: red;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left">
    <button class="top-action" onclick="goBack()">⬅ Indietro</button>
</div>

    <div class="topbar-center">
        <h2 class="title-gradient">🎬 KitsuStream</h2>
        <h2 class="title-purple">⭐ La mia lista</h2>
    </div>

    <div class="topbar-right" style="text-align:right;"></div>
</div>

<div class="container">
    <div id="list" class="grid"></div>
</div>

<!-- PLAYER -->
<div id="playerModal" class="player-modal" onclick="handleOutsideClick(event)">
    <div class="player-box" id="playerBox">
        <iframe id="videoFrame" allowfullscreen></iframe>

        <div class="player-controls">
            <button class="close-btn" onclick="closePlayer()">❌ Chiudi</button>
        </div>
    </div>
</div>

<script>

function goBack() {
    window.location.href = "index.html";
}

function getList() {
    return JSON.parse(localStorage.getItem("myMovies")) || [];
}

function saveList(list) {
    localStorage.setItem("myMovies", JSON.stringify(list));
}

function removeMovie(id) {
    let list = getList().filter(m => m.id !== id);
    saveList(list);
    renderList();
}

/* NAV MOVIE PAGE */
function openMoviePage(id) {
    window.location.href = "movie.html?id=" + id;
}

/* PLAYER */
function openPlayer(url) {
    document.getElementById("videoFrame").src = url;
    document.getElementById("playerModal").style.display = "flex";
}

function closePlayer() {
    document.getElementById("videoFrame").src = "";
    document.getElementById("playerModal").style.display = "none";
}

function handleOutsideClick(e) {
    const box = document.getElementById("playerBox");
    if (!box.contains(e.target)) closePlayer();
}

/* RENDER */
function renderList() {
    const container = document.getElementById("list");
    const list = getList();

    container.innerHTML = "";

    if (list.length === 0) {
        container.innerHTML = "<p>Nessun film salvato</p>";
        return;
    }

    list.forEach(movie => {

        const link = `https://vixsrc.to/movie/${movie.id}?lang=it`;

        container.innerHTML += `
            <div class="card">

                <img src="${movie.poster}" onclick="openMoviePage(${movie.id})">

                <div class="card-content">
                    <h4>${movie.title}</h4>

                    <button onclick="openPlayer('${link}')">
                        ▶ Guarda
                    </button>

                    <button onclick="removeMovie(${movie.id})" style="margin-top:8px; background:#ef4444;">
                        ❌ Rimuovi
                    </button>
                </div>

            </div>
        `;
    });
}

renderList();

</script>

</body>
</html>

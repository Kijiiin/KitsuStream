<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>KitsuStream</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
}

.topbar {
    display: flex;
    align-items: center;
    padding: 20px 30px;
}

.topbar-left, .topbar-right {
    width: 120px;
}

.topbar-center {
    flex: 1;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
}

h2 {
    margin: 0;
    color: #c084fc;
}

.list-btn {
    background: #7c3aed;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 30px;
    text-align: center;
}

input {
    width: 60%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #1f1b3a;
    color: white;
    outline: none;
}

.genres {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.genre-btn {
    padding: 8px 12px;
    border-radius: 20px;
    border: 1px solid #7c3aed;
    background: transparent;
    color: white;
    cursor: pointer;
}

.genre-btn.active {
    background: #7c3aed;
}

.grid {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
}

.card {
    background: #1f1b3a;
    border-radius: 12px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 270px;
    object-fit: cover;
    cursor: pointer;
}

.card-content {
    padding: 10px;
}

.card h4 {
    margin: 5px 0;
    font-size: 14px;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #7c3aed;
    color: white;
    cursor: pointer;
}

/* ===================== */
/* 🎬 PLAYER (UNIFICATO) */
/* ===================== */

.player-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.player-box {
    width: 90%;
    max-width: 1000px;
    background: #0b0b0f;
    padding: 12px;
    border-radius: 14px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    animation: pop 0.25s ease;
}

@keyframes pop {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.player-box iframe {
    width: 100%;
    height: 520px;
    border: none;
    border-radius: 12px;
}

.player-controls {
    margin-top: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.close-btn {
    background: linear-gradient(135deg, #ef4444, #b91c1c);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
    box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
}

.close-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(239, 68, 68, 0.7);
}
</style>
</head>

<body>

<!-- TOPBAR (UGUALE AL TUO) -->
<div class="topbar">
    <div class="topbar-left"></div>

    <div class="topbar-center">
        <button class="list-btn" onclick="goHome()">🏠 Home</button>
        <h2>🎬 KitsuStream</h2>
    </div>

    <div class="topbar-right">
        <button class="list-btn" onclick="goToList()">⭐ Lista</button>
    </div>
</div>

<div class="container">

    <div>
        <input type="text" id="movie" placeholder="Cerca film..." autofocus>
        <button onclick="clearSearch()">❌ Cancella</button>
    </div>

    <div class="genres">
        <!-- identico al tuo -->
    </div>

    <div id="results" class="grid"></div>

</div>

<!-- PLAYER (ORA UGUALE A LIST.HTML) -->
<div id="playerModal" class="player-modal" onclick="handleOutsideClick(event)">
    <div class="player-box" id="playerBox">
        <iframe id="videoFrame" allowfullscreen></iframe>

        <div class="player-controls">
            <button class="close-btn" onclick="closePlayer()">❌ Chiudi</button>
        </div>
    </div>
</div>

<script>
/* IL TUO JS È IDENTICO, NON CAMBIA */
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";

let currentPage = 1;
let selectedGenres = [];

window.onload = function() {
    loadTrendingMovies(1);
    document.getElementById("movie").focus();
};

function goToList() {
    window.location.href = "list.html";
}

function goHome() {
    document.getElementById("movie").value = "";
    selectedGenres = [];
    document.querySelectorAll(".genre-btn").forEach(btn => btn.classList.remove("active"));
    loadTrendingMovies(1);
}

function clearSearch() {
    document.getElementById("movie").value = "";
    loadTrendingMovies(1);
}

function openMoviePage(id) {
    window.location.href = `movie.html?id=${id}`;
}

function openPlayer(url) {
    document.getElementById("videoFrame").src = url;
    document.getElementById("playerModal").style.display = "flex";
}

function closePlayer() {
    document.getElementById("videoFrame").src = "";
    document.getElementById("playerModal").style.display = "none";
}

function handleOutsideClick(e) {
    const box = document.getElementById("playerBox");
    if (!box.contains(e.target)) closePlayer();
}
</script>

</body>
</html>

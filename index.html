<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>KitsuStream</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
}

.topbar {
    display: flex;
    align-items: center;
    padding: 20px 30px;
}

.topbar-left, .topbar-right {
    width: 120px;
}

.topbar-center {
    flex: 1;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
}

h2 {
    margin: 0;
    color: #c084fc;
}

.list-btn {
    background: #7c3aed;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 30px;
    text-align: center;
}

input {
    width: 60%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #1f1b3a;
    color: white;
    outline: none;
}

.genres {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.genre-btn {
    padding: 8px 12px;
    border-radius: 20px;
    border: 1px solid #7c3aed;
    background: transparent;
    color: white;
    cursor: pointer;
}

.genre-btn.active {
    background: #7c3aed;
}

.grid {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
}

.card {
    background: #1f1b3a;
    border-radius: 12px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 270px;
    object-fit: cover;
    cursor: pointer;
}

.card-content {
    padding: 10px;
}

.card h4 {
    margin: 5px 0;
    font-size: 14px;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #7c3aed;
    color: white;
    cursor: pointer;
}

.pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-top: 30px;
}

/* PLAYER */
.player-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.player-box {
    width: 90%;
    max-width: 1000px;
}

.player-box iframe {
    width: 100%;
    height: 500px;
    border: none;
    border-radius: 10px;
}

.player-controls {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
}

.close-btn {
    background: red;
}

.fullscreen-btn {
    background: #00d4ff;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left"></div>

    <div class="topbar-center">
        <button class="list-btn" onclick="goHome()">🏠 Home</button>
        <h2>🎬 KitsuStream</h2>
    </div>

    <div class="topbar-right">
        <button class="list-btn" onclick="goToList()">⭐ Lista</button>
    </div>
</div>

<div class="container">

    <div>
        <input type="text" id="movie" placeholder="Cerca film..." autofocus>
        <button onclick="clearSearch()">❌ Cancella</button>
    </div>

    <!-- GENERI COMPLETI -->
    <div class="genres">
        <button class="genre-btn" data-id="28">Azione</button>
        <button class="genre-btn" data-id="12">Avventura</button>
        <button class="genre-btn" data-id="16">Animazione</button>
        <button class="genre-btn" data-id="35">Commedia</button>
        <button class="genre-btn" data-id="80">Crime</button>
        <button class="genre-btn" data-id="99">Documentario</button>
        <button class="genre-btn" data-id="18">Dramma</button>
        <button class="genre-btn" data-id="10751">Famiglia</button>
        <button class="genre-btn" data-id="14">Fantasy</button>
        <button class="genre-btn" data-id="36">Storico</button>
        <button class="genre-btn" data-id="27">Horror</button>
        <button class="genre-btn" data-id="10402">Musica</button>
        <button class="genre-btn" data-id="9648">Mistero</button>
        <button class="genre-btn" data-id="10749">Romance</button>
        <button class="genre-btn" data-id="878">Fantascienza</button>
        <button class="genre-btn" data-id="53">Thriller</button>
        <button class="genre-btn" data-id="10752">Guerra</button>
        <button class="genre-btn" data-id="37">Western</button>
    </div>

    <div id="results" class="grid"></div>

    <div class="pagination">
        <button onclick="prevPage()">⬅️</button>
        <span id="pageNumber">Pagina 1</span>
        <button onclick="nextPage()">➡️</button>
    </div>

</div>

<!-- PLAYER -->
<div id="playerModal" class="player-modal" onclick="handleOutsideClick(event)">
    <div class="player-box" id="playerBox">
        <iframe id="videoFrame" allowfullscreen></iframe>

        <div class="player-controls">
            <button class="close-btn" onclick="closePlayer()">❌</button>
        </div>
    </div>
</div>

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";

let currentPage = 1;
let selectedGenres = [];

/* INIT */
window.onload = function() {
    loadTrendingMovies(1);
    document.getElementById("movie").focus();
};

/* NAV */
function goToList() {
    window.location.href = "list.html";
}

function goHome() {
    document.getElementById("movie").value = "";
    selectedGenres = [];
    document.querySelectorAll(".genre-btn").forEach(btn => btn.classList.remove("active"));
    loadTrendingMovies(1);
}

function clearSearch() {
    document.getElementById("movie").value = "";
    loadTrendingMovies(1);
}

/* CLICK POSTER */
function openMoviePage(id) {
    window.location.href = `movie.html?id=${id}`;
}

/* SEARCH */
document.getElementById("movie").addEventListener("input", async () => {
    const query = document.getElementById("movie").value.trim();

    if (!query) {
        loadTrendingMovies(1);
        return;
    }

    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${query}&language=it-IT`);
    const data = await res.json();
    displayMovies(data.results);
});

/* GENRES */
document.querySelectorAll(".genre-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-id");

        if (selectedGenres.includes(id)) {
            selectedGenres = selectedGenres.filter(g => g !== id);
            btn.classList.remove("active");
        } else {
            selectedGenres.push(id);
            btn.classList.add("active");
        }

        filterByGenre();
    });
});

/* API */
async function loadTrendingMovies(page = 1) {
    currentPage = page;

    const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=it-IT&page=${page}`);
    const data = await res.json();

    displayMovies(data.results);
    updatePageNumber();
}

async function filterByGenre() {
    if (selectedGenres.length === 0) {
        loadTrendingMovies(1);
        return;
    }

    const genreQuery = selectedGenres.join(",");

    const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${genreQuery}&language=it-IT`);
    const data = await res.json();

    displayMovies(data.results);
}

/* LIST STORAGE */
function getList() {
    return JSON.parse(localStorage.getItem("myMovies")) || [];
}

function saveList(list) {
    localStorage.setItem("myMovies", JSON.stringify(list));
}

function isInList(id) {
    return getList().some(m => m.id === id);
}

function toggleList(id, title, poster) {
    let list = getList();
    const exists = list.find(m => m.id === id);

    if (exists) {
        list = list.filter(m => m.id !== id);
    } else {
        list.push({ id, title, poster });
    }

    saveList(list);

    const btn = document.getElementById(`btn-${id}`);
    const nowInList = !exists;

    btn.innerText = nowInList ? "❌ Rimuovi" : "⭐ Lista";
    btn.style.background = nowInList ? "#ef4444" : "#7c3aed";
}

/* DISPLAY */
function displayMovies(movies) {
    const results = document.getElementById("results");
    results.innerHTML = "";

    movies.forEach(movie => {
        const poster = movie.poster_path
            ? IMG_BASE + movie.poster_path
            : "https://via.placeholder.com/500x750";

        const link = `https://vixsrc.to/movie/${movie.id}?lang=it`;
        const inList = isInList(movie.id);

        results.innerHTML += `
            <div class="card">
                <img src="${poster}" onclick="openMoviePage(${movie.id})">

                <div class="card-content">
                    <h4>${movie.title}</h4>

                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <button onclick="openPlayer('${link}')">▶ Guarda</button>

                        <button 
                            id="btn-${movie.id}"
                            onclick="toggleList(${movie.id}, '${movie.title.replace(/'/g,"\\'")}', '${poster.replace(/'/g,"\\'")}')"
                            style="background:${inList ? '#ef4444' : '#7c3aed'}"
                        >
                            ${inList ? "❌ Rimuovi" : "⭐ Lista"}
                        </button>
                    </div>
                </div>
            </div>
        `;
    });
}

/* PLAYER */
function openPlayer(url) {
    document.getElementById("videoFrame").src = url;
    document.getElementById("playerModal").style.display = "flex";
}

function closePlayer() {
    document.getElementById("videoFrame").src = "";
    document.getElementById("playerModal").style.display = "none";
}

function handleOutsideClick(e) {
    const box = document.getElementById("playerBox");
    if (!box.contains(e.target)) closePlayer();
}

function toggleFullscreen() {
    const box = document.getElementById("playerBox");

    if (!document.fullscreenElement) {
        box.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

/* PAGINATION */
function nextPage() {
    currentPage++;
    loadTrendingMovies(currentPage);
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        loadTrendingMovies(currentPage);
    }
}

function updatePageNumber() {
    document.getElementById("pageNumber").innerText = "Pagina " + currentPage;
}
</script>

</body>
</html>

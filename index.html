<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KitsuStream - Film e Serie TV</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    min-height: 100vh;
}

.topbar {
    display: flex;
    align-items: center;
    padding: 20px 30px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left, .topbar-right {
    width: 140px;
}

.topbar-center {
    flex: 1;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: 28px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 20px rgba(124,58,237,0.3);
}

.list-btn, .media-btn {
    background: rgba(124, 58, 237, 0.8);
    border: none;
    padding: 10px 20px;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
}

.list-btn:hover, .media-btn:hover {
    background: #7c3aed;
    transform: translateY(-2px);
}

.media-btn.active {
    background: #7c3aed;
    box-shadow: 0 0 15px rgba(124, 58, 237, 0.5);
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 30px;
    text-align: center;
}

.search-section {
    margin-bottom: 30px;
}

.search-box {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

input {
    flex: 1;
    max-width: 500px;
    padding: 14px 20px;
    border-radius: 25px;
    border: none;
    background: rgba(31, 27, 58, 0.9);
    color: white;
    outline: none;
    font-size: 16px;
    backdrop-filter: blur(5px);
}

input::placeholder {
    color: rgba(255,255,255,0.5);
}

.clear-btn {
    background: rgba(239, 68, 68, 0.8);
    padding: 10px 20px;
    border-radius: 25px;
}

.media-selector {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 25px;
}

.genres {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    max-height: 120px;
    overflow-y: auto;
    padding: 10px;
}

.genre-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid #7c3aed;
    background: transparent;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 13px;
}

.genre-btn:hover {
    background: rgba(124, 58, 237, 0.3);
}

.genre-btn.active {
    background: #7c3aed;
    box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
}

.grid {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 25px;
}

.card {
    background: rgba(31, 27, 58, 0.7);
    border-radius: 15px;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    backdrop-filter: blur(10px);
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.card:hover img {
    transform: scale(1.05);
}

.card-content {
    padding: 15px;
}

.card h4 {
    margin: 5px 0;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.card p {
    font-size: 12px;
    color: #c084fc;
    margin-bottom: 10px;
}

.rating {
    color: #ffd700;
    font-size: 12px;
    margin-bottom: 10px;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    background: #7c3aed;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 12px;
}

button:hover {
    opacity: 0.9;
    transform: scale(0.98);
}

.pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-top: 40px;
}

.pagination button {
    padding: 10px 20px;
    background: rgba(124, 58, 237, 0.8);
}

#pageNumber {
    font-size: 14px;
    background: rgba(0,0,0,0.5);
    padding: 8px 16px;
    border-radius: 20px;
}

/* PLAYER MODAL */
.player-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.player-box {
    width: 90%;
    max-width: 1100px;
    background: #000;
    border-radius: 15px;
    overflow: hidden;
}

.player-box iframe {
    width: 100%;
    height: 60vh;
    min-height: 400px;
    border: none;
}

.player-controls {
    padding: 15px;
    display: flex;
    justify-content: space-between;
    background: #1a1a1a;
}

.close-btn {
    background: #ef4444;
}

.fullscreen-btn {
    background: #00d4ff;
}

.loading {
    text-align: center;
    padding: 50px;
    font-size: 18px;
    color: #c084fc;
}

.no-results {
    text-align: center;
    padding: 50px;
    font-size: 18px;
    color: #888;
}

@media (max-width: 768px) {
    .topbar {
        padding: 15px;
    }
    
    .topbar-left, .topbar-right {
        width: 70px;
    }
    
    h1 {
        font-size: 20px;
    }
    
    .container {
        padding: 20px;
    }
    
    .grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 15px;
    }
    
    .card img {
        height: 220px;
    }
    
    .player-box iframe {
        height: 40vh;
    }
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left">
        <button class="list-btn" onclick="goHome()">🏠 Home</button>
    </div>

    <div class="topbar-center">
        <h1>🎬 KitsuStream</h1>
    </div>

    <div class="topbar-right">
        <button class="list-btn" onclick="goToList()">⭐ La mia lista</button>
    </div>
</div>

<div class="container">
    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cerca film o serie TV..." autocomplete="off">
            <button class="clear-btn" onclick="clearSearch()">❌ Cancella</button>
        </div>
    </div>

    <div class="media-selector">
        <button class="media-btn active" data-type="movie" onclick="switchMediaType('movie')">🎬 Film</button>
        <button class="media-btn" data-type="tv" onclick="switchMediaType('tv')">📺 Serie TV</button>
    </div>

    <div id="genresContainer" class="genres"></div>

    <div id="results" class="grid"></div>

    <div class="pagination" id="pagination">
        <button onclick="prevPage()">⬅️ Precedente</button>
        <span id="pageNumber">Pagina 1</span>
        <button onclick="nextPage()">Successiva ➡️</button>
    </div>
</div>

<div id="playerModal" class="player-modal" onclick="handleOutsideClick(event)">
    <div class="player-box" id="playerBox">
        <iframe id="videoFrame" allowfullscreen></iframe>
        <div class="player-controls">
            <button class="close-btn" onclick="closePlayer()">❌ Chiudi</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Schermo intero</button>
        </div>
    </div>
</div>

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";

let currentPage = 1;
let selectedGenres = [];
let currentMediaType = "movie";
let searchQuery = "";
let totalPages = 1;

const movieGenres = [
    { id: "28", name: "Azione" }, { id: "12", name: "Avventura" }, { id: "16", name: "Animazione" },
    { id: "35", name: "Commedia" }, { id: "80", name: "Crime" }, { id: "99", name: "Documentario" },
    { id: "18", name: "Dramma" }, { id: "10751", name: "Famiglia" }, { id: "14", name: "Fantasy" },
    { id: "36", name: "Storico" }, { id: "27", name: "Horror" }, { id: "10402", name: "Musica" },
    { id: "9648", name: "Mistero" }, { id: "10749", name: "Romance" }, { id: "878", name: "Fantascienza" },
    { id: "53", name: "Thriller" }, { id: "10752", name: "Guerra" }, { id: "37", name: "Western" }
];

const tvGenres = [
    { id: "10759", name: "Action & Adventure" }, { id: "16", name: "Animazione" }, { id: "35", name: "Commedia" },
    { id: "80", name: "Crime" }, { id: "99", name: "Documentario" }, { id: "18", name: "Dramma" },
    { id: "10751", name: "Famiglia" }, { id: "10762", name: "Kids" }, { id: "9648", name: "Mistero" },
    { id: "10763", name: "News" }, { id: "10764", name: "Reality" }, { id: "10765", name: "Sci-Fi & Fantasy" },
    { id: "10766", name: "Soap" }, { id: "10767", name: "Talk" }, { id: "10768", name: "War & Politics" },
    { id: "37", name: "Western" }
];

window.onload = function() {
    loadContent();
    document.getElementById("searchInput").addEventListener("input", handleSearch);
};

function switchMediaType(type) {
    currentMediaType = type;
    currentPage = 1;
    selectedGenres = [];
    searchQuery = "";
    document.getElementById("searchInput").value = "";
    
    document.querySelectorAll(".media-btn").forEach(btn => btn.classList.remove("active"));
    document.querySelector(`[data-type="${type}"]`).classList.add("active");
    
    renderGenres();
    loadContent();
}

function renderGenres() {
    const genresContainer = document.getElementById("genresContainer");
    const genresList = currentMediaType === "movie" ? movieGenres : tvGenres;
    
    genresContainer.innerHTML = genresList.map(genre => `
        <button class="genre-btn" data-id="${genre.id}" onclick="toggleGenre('${genre.id}')">
            ${genre.name}
        </button>
    `).join("");
}

function toggleGenre(genreId) {
    const btn = document.querySelector(`.genre-btn[data-id="${genreId}"]`);
    
    if (selectedGenres.includes(genreId)) {
        selectedGenres = selectedGenres.filter(id => id !== genreId);
        btn.classList.remove("active");
    } else {
        selectedGenres.push(genreId);
        btn.classList.add("active");
    }
    
    currentPage = 1;
    loadContent();
}

function handleSearch() {
    searchQuery = document.getElementById("searchInput").value.trim();
    currentPage = 1;
    loadContent();
}

function clearSearch() {
    document.getElementById("searchInput").value = "";
    searchQuery = "";
    currentPage = 1;
    loadContent();
}

async function loadContent() {
    showLoading();
    
    try {
        let url = "";
        
        if (searchQuery) {
            const searchType = currentMediaType === "movie" ? "movie" : "tv";
            url = `https://api.themoviedb.org/3/search/${searchType}?api_key=${API_KEY}&query=${encodeURIComponent(searchQuery)}&language=it-IT&page=${currentPage}`;
        } else if (selectedGenres.length > 0) {
            const genreQuery = selectedGenres.join(",");
            url = `https://api.themoviedb.org/3/discover/${currentMediaType}?api_key=${API_KEY}&with_genres=${genreQuery}&language=it-IT&page=${currentPage}&sort_by=popularity.desc`;
        } else {
            url = `https://api.themoviedb.org/3/${currentMediaType}/popular?api_key=${API_KEY}&language=it-IT&page=${currentPage}`;
        }
        
        const response = await fetch(url);
        const data = await response.json();
        
        totalPages = Math.min(data.total_pages, 500);
        displayItems(data.results);
        updatePageNumber();
    } catch (error) {
        console.error("Errore:", error);
        document.getElementById("results").innerHTML = '<div class="no-results">❌ Errore nel caricamento</div>';
    }
}

function showLoading() {
    document.getElementById("results").innerHTML = '<div class="loading">⏳ Caricamento in corso...</div>';
}

function displayItems(items) {
    const resultsDiv = document.getElementById("results");
    
    if (!items || items.length === 0) {
        resultsDiv.innerHTML = '<div class="no-results">😕 Nessun risultato trovato</div>';
        return;
    }
    
    resultsDiv.innerHTML = items.map(item => {
        const posterUrl = item.poster_path ? IMG_BASE + item.poster_path : "https://via.placeholder.com/500x750?text=No+Image";
        const title = currentMediaType === "movie" ? item.title : item.name;
        const date = currentMediaType === "movie" ? item.release_date : item.first_air_date;
        const year = date ? date.split("-")[0] : "N/D";
        const rating = item.vote_average ? item.vote_average.toFixed(1) : "N/A";
        const inList = isInList(item.id);
        const mediaLink = `https://vixsrc.to/${currentMediaType === "movie" ? "movie" : "tv"}/${item.id}?lang=it`;
        
        return `
            <div class="card">
                <img src="${posterUrl}" alt="${title}" onclick="openDetailsPage(${item.id})">
                <div class="card-content">
                    <h4>${escapeHtml(title)}</h4>
                    <div class="rating">⭐ ${rating}/10</div>
                    <p>📅 ${year}</p>
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <button onclick="openPlayer('${mediaLink}')">▶ Guarda</button>
                        <button 
                            id="btn-${item.id}"
                            onclick="toggleList(${item.id}, '${escapeHtml(title)}', '${posterUrl}', ${item.vote_average || 0}, '${year}')"
                            style="background:${inList ? '#ef4444' : '#7c3aed'}"
                        >
                            ${inList ? "❌ Rimuovi" : "⭐ Aggiungi alla lista"}
                        </button>
                    </div>
                </div>
            </div>
        `;
    }).join("");
}

function openDetailsPage(id) {
    window.location.href = `${currentMediaType === "movie" ? "movie" : "tv"}.html?id=${id}`;
}

function getList() {
    return JSON.parse(localStorage.getItem("myMediaList")) || [];
}

function saveList(list) {
    localStorage.setItem("myMediaList", JSON.stringify(list));
}

function isInList(id) {
    return getList().some(item => item.id === id && item.type === currentMediaType);
}

function toggleList(id, title, poster, rating, year) {
    let list = getList();
    const exists = list.find(item => item.id === id && item.type === currentMediaType);
    
    if (exists) {
        list = list.filter(item => !(item.id === id && item.type === currentMediaType));
    } else {
        list.push({ 
            id, title, poster, rating, year,
            type: currentMediaType,
            mediaType: currentMediaType === "movie" ? "Film" : "Serie TV"
        });
    }
    
    saveList(list);
    
    const btn = document.getElementById(`btn-${id}`);
    if (btn) {
        const nowInList = !exists;
        btn.innerText = nowInList ? "❌ Rimuovi" : "⭐ Aggiungi alla lista";
        btn.style.background = nowInList ? "#ef4444" : "#7c3aed";
    }
}

function goHome() {
    searchQuery = "";
    selectedGenres = [];
    currentPage = 1;
    document.getElementById("searchInput").value = "";
    document.querySelectorAll(".genre-btn").forEach(btn => btn.classList.remove("active"));
    loadContent();
}

function goToList() {
    window.location.href = "list.html";
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        loadContent();
        window.scrollTo({ top: 0, behavior: "smooth" });
    }
}

function nextPage() {
    if (currentPage < totalPages) {
        currentPage++;
        loadContent();
        window.scrollTo({ top: 0, behavior: "smooth" });
    }
}

function updatePageNumber() {
    document.getElementById("pageNumber").innerText = `Pagina ${currentPage} di ${totalPages}`;
}

function openPlayer(url) {
    document.getElementById("videoFrame").src = url;
    document.getElementById("playerModal").style.display = "flex";
}

function closePlayer() {
    document.getElementById("videoFrame").src = "";
    document.getElementById("playerModal").style.display = "none";
}

function handleOutsideClick(e) {
    const box = document.getElementById("playerBox");
    if (!box.contains(e.target)) closePlayer();
}

function toggleFullscreen() {
    const box = document.getElementById("playerBox");
    if (!document.fullscreenElement) {
        box.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

renderGenres();
</script>

</body>
</html>

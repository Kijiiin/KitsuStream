<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Movie Finder</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #2c3e50);
        color: white;
    }

    .container {
        max-width: 1000px;
        margin: auto;
        padding: 30px;
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        width: 60%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 14px;
    }

    button {
        padding: 12px 18px;
        border: none;
        border-radius: 8px;
        background: #4CAF50;
        color: white;
        font-size: 14px;
        cursor: pointer;
        margin-left: 10px;
    }

    button:hover {
        background: #45a049;
    }

    .grid {
        margin-top: 30px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
    }

    .card {
        background: #ffffff15;
        border-radius: 12px;
        overflow: hidden;
        transition: transform 0.2s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .card img {
        width: 100%;
        height: 270px;
        object-fit: cover;
    }

    .card-content {
        padding: 10px;
    }

    .card h4 {
        margin: 5px 0;
        font-size: 14px;
    }

    .card a {
        display: inline-block;
        margin-top: 8px;
        font-size: 12px;
        color: #00d4ff;
        text-decoration: none;
    }
</style>
</head>

<body>

<div class="container">
    <h2>🎬 Movie Finder</h2>

    <div>
        <input type="text" id="movie" placeholder="Inserisci nome film">
        <button onclick="searchMovie()">Cerca</button>
    </div>

    <div id="results" class="grid"></div>
</div>

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";

// 👉 carica film “in voga / trending” all’apertura
window.onload = loadTrendingMovies;

async function loadTrendingMovies() {
    const url = `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=it-IT`;

    const res = await fetch(url);
    const data = await res.json();

    displayMovies(data.results);
}

async function searchMovie() {
    const query = document.getElementById("movie").value;

    if (!query) return;

    const url = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${query}&language=it-IT`;

    const res = await fetch(url);
    const data = await res.json();

    displayMovies(data.results);
}

function displayMovies(movies) {
    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    movies.forEach(movie => {
        const tmdb_id = movie.id;
        const title = movie.title;

        const poster = movie.poster_path 
            ? IMG_BASE + movie.poster_path 
            : "https://via.placeholder.com/500x750?text=No+Image";

        const link = `https://vixsrc.to/movie/${tmdb_id}?lang=it`;

        resultsDiv.innerHTML += `
            <div class="card">
                <img src="${poster}" alt="${title}">
                <div class="card-content">
                    <h4>${title}</h4>
                    <a href="${link}" target="_blank">▶ Apri</a>
                </div>
            </div>
        `;
    });
}
</script>

</body>
</html>

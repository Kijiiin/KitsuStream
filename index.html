<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KitsuStream - Film e Serie TV</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    min-height: 100vh;
}

/* ============================================ */
/* STILE MOBILE (default - fino a 768px) */
/* ============================================ */

/* Topbar mobile */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left, .topbar-right {
    width: auto;
}

.topbar-center {
    flex: 1;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.list-btn {
    background: rgba(124, 58, 237, 0.9);
    border: none;
    padding: 6px 12px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s ease;
}

.list-btn:active {
    transform: scale(0.95);
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 16px;
}

/* Search mobile */
.search-section {
    margin-bottom: 16px;
}

.search-box {
    display: flex;
    gap: 8px;
}

input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 30px;
    border: none;
    background: rgba(31, 27, 58, 0.9);
    color: white;
    outline: none;
    font-size: 14px;
}

input::placeholder {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
}

.clear-btn {
    background: rgba(239, 68, 68, 0.9);
    padding: 0 14px;
    border-radius: 30px;
    font-size: 12px;
}

/* Media selector mobile */
.media-selector {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
}

.media-btn {
    background: rgba(124, 58, 237, 0.5);
    border: 1px solid rgba(124, 58, 237, 0.5);
    padding: 8px 16px;
    border-radius: 40px;
    color: white;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    flex: 0 1 auto;
}

.media-btn.active {
    background: #7c3aed;
    border-color: #7c3aed;
}

/* Selettore ordine mobile */
.order-selector {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
}

.order-btn {
    background: rgba(124, 58, 237, 0.4);
    border: 1px solid rgba(124, 58, 237, 0.5);
    padding: 5px 10px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.2s ease;
}

.order-btn.active {
    background: #7c3aed;
    border-color: #7c3aed;
}

.order-btn:active {
    transform: scale(0.95);
}

/* Selettore anno mobile */
.year-selector {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
}

.year-select {
    background: rgba(124, 58, 237, 0.4);
    border: 1px solid rgba(124, 58, 237, 0.5);
    padding: 5px 10px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
}

.year-select option {
    background: #1f1b3a;
    color: white;
}

.year-label {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
}

/* Generi scrollabili orizzontalmente (mobile) */
.genres {
    margin: 12px 0 16px;
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    gap: 8px;
    padding: 4px 0 8px;
    scrollbar-width: thin;
    -webkit-overflow-scrolling: touch;
}

.genres::-webkit-scrollbar {
    height: 3px;
}

.genres::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}

.genres::-webkit-scrollbar-thumb {
    background: #7c3aed;
    border-radius: 10px;
}

.genre-btn {
    padding: 5px 12px;
    border-radius: 30px;
    border: 1px solid #7c3aed;
    background: transparent;
    color: white;
    cursor: pointer;
    font-size: 11px;
    white-space: nowrap;
    flex-shrink: 0;
}

.genre-btn.active {
    background: #7c3aed;
}

/* Grid mobile: 2 colonne */
.grid {
    margin-top: 16px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.card {
    background: rgba(31, 27, 58, 0.6);
    border-radius: 12px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    transition: transform 0.2s ease;
}

.card:active {
    transform: scale(0.98);
}

.card img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    cursor: pointer;
}

.card-content {
    padding: 8px;
}

.card h4 {
    margin: 0 0 3px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.rating {
    color: #ffd700;
    font-size: 10px;
    margin-bottom: 3px;
}

.card p {
    font-size: 9px;
    color: #c084fc;
    margin-bottom: 6px;
}

.card button {
    padding: 6px 0;
    border: none;
    border-radius: 8px;
    background: #7c3aed;
    color: white;
    cursor: pointer;
    font-size: 10px;
    font-weight: 500;
    width: 100%;
}

.card button:active {
    opacity: 0.8;
}

/* Pagination mobile */
.pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-top: 24px;
    margin-bottom: 16px;
}

.pagination button {
    padding: 6px 14px;
    background: rgba(124, 58, 237, 0.8);
    border-radius: 30px;
    font-size: 12px;
}

#pageNumber {
    font-size: 11px;
    background: rgba(0,0,0,0.5);
    padding: 5px 10px;
    border-radius: 30px;
}

.loading, .no-results {
    text-align: center;
    padding: 40px;
    font-size: 13px;
    color: #c084fc;
}

.no-results {
    color: #888;
}

/* ============================================ */
/* STILE DESKTOP (sopra i 768px) */
/* ============================================ */

@media (min-width: 769px) {
    
    /* Topbar desktop */
    .topbar {
        padding: 20px 40px;
        background: rgba(0,0,0,0.3);
    }
    
    .topbar-left, .topbar-right {
        width: 140px;
    }
    
    .topbar-center {
        flex: 1;
    }
    
    h1 {
        font-size: 28px;
    }
    
    .list-btn {
        padding: 10px 20px;
        font-size: 14px;
    }
    
    .list-btn:hover {
        transform: translateY(-2px);
        background: #7c3aed;
    }
    
    .container {
        padding: 30px;
    }
    
    /* Search desktop - CENTRATA */
    .search-section {
        margin-bottom: 30px;
        display: flex;
        justify-content: center;
    }
    
    .search-box {
        display: flex;
        gap: 10px;
        justify-content: center;
        width: 100%;
        max-width: 600px;
    }
    
    input {
        padding: 14px 20px;
        font-size: 16px;
        width: 100%;
        max-width: 500px;
    }
    
    input::placeholder {
        font-size: 14px;
    }
    
    .clear-btn {
        padding: 10px 20px;
        font-size: 14px;
    }
    
    .clear-btn:hover {
        background: #dc2626;
    }
    
    /* Media selector desktop */
    .media-selector {
        gap: 15px;
        margin-bottom: 25px;
    }
    
    .media-btn {
        padding: 10px 24px;
        font-size: 15px;
    }
    
    .media-btn:hover {
        transform: translateY(-2px);
        background: #7c3aed;
    }
    
    /* Selettore ordine desktop */
    .order-selector {
        gap: 12px;
        margin-bottom: 15px;
    }
    
    .order-btn {
        padding: 8px 16px;
        font-size: 13px;
    }
    
    .order-btn:hover {
        background: rgba(124, 58, 237, 0.6);
        transform: translateY(-1px);
    }
    
    /* Selettore anno desktop */
    .year-selector {
        gap: 10px;
        margin-bottom: 20px;
    }
    
    .year-select {
        padding: 8px 16px;
        font-size: 13px;
    }
    
    .year-label {
        font-size: 13px;
    }
    
    /* Generi desktop: griglia normale (non scrollabile) */
    .genres {
        flex-wrap: wrap;
        overflow-x: visible;
        justify-content: center;
        max-height: none;
        gap: 10px;
        margin: 20px 0;
        padding: 10px;
    }
    
    .genre-btn {
        padding: 8px 16px;
        font-size: 13px;
    }
    
    .genre-btn:hover {
        background: rgba(124, 58, 237, 0.3);
        transform: translateY(-1px);
    }
    
    /* Grid desktop: 5 colonne */
    .grid {
        margin-top: 30px;
        grid-template-columns: repeat(5, 1fr);
        gap: 25px;
    }
    
    .card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .card:hover img {
        transform: scale(1.05);
    }
    
    .card img {
        transition: transform 0.3s ease;
    }
    
    .card-content {
        padding: 15px;
    }
    
    .card h4 {
        font-size: 14px;
        margin: 5px 0;
    }
    
    .rating {
        font-size: 12px;
        margin-bottom: 10px;
    }
    
    .card p {
        font-size: 12px;
        margin-bottom: 10px;
    }
    
    .card button {
        padding: 8px 12px;
        font-size: 12px;
    }
    
    .card button:hover {
        opacity: 0.9;
        transform: scale(0.98);
    }
    
    /* Pagination desktop */
    .pagination {
        gap: 20px;
        margin-top: 40px;
    }
    
    .pagination button {
        padding: 10px 20px;
        font-size: 14px;
    }
    
    .pagination button:hover {
        opacity: 0.9;
        transform: scale(0.98);
    }
    
    #pageNumber {
        font-size: 14px;
        padding: 8px 16px;
    }
    
    .loading, .no-results {
        padding: 50px;
        font-size: 18px;
    }
}

/* Tablet (opzionale, tra 769px e 1024px) */
@media (min-width: 769px) and (max-width: 1024px) {
    .grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }
}

/* Desktop grande */
@media (min-width: 1400px) {
    .grid {
        grid-template-columns: repeat(6, 1fr);
    }
}

/* Animazioni */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
}

.loading {
    animation: pulse 1.5s ease-in-out infinite;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left">
        <button class="list-btn" onclick="goHome()">🏠 Home</button>
    </div>

    <div class="topbar-center">
        <h1>🎬 KitsuStream</h1>
    </div>

    <div class="topbar-right">
        <button class="list-btn" onclick="goToList()">⭐ Lista</button>
    </div>
</div>

<div class="container">
    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cerca film o serie TV..." autocomplete="off">
            <button class="clear-btn" onclick="clearSearch()">✖</button>
        </div>
    </div>

    <div class="media-selector">
        <button class="media-btn active" data-type="movie" onclick="switchMediaType('movie')">🎬 Film</button>
        <button class="media-btn" data-type="tv" onclick="switchMediaType('tv')">📺 Serie TV</button>
    </div>

    <!-- Selettore ordine -->
    <div class="order-selector">
        <button class="order-btn active" data-order="popular" onclick="changeOrder('popular')">🔥 Popolari</button>
        <button class="order-btn" data-order="top_rated" onclick="changeOrder('top_rated')">⭐ Più votati</button>
        <button class="order-btn" data-order="latest" onclick="changeOrder('latest')">📅 Per anno</button>
    </div>

    <!-- Selettore anno (visibile solo quando "Per anno" è selezionato) -->
    <div id="yearSelector" class="year-selector" style="display: none;">
        <span class="year-label">📅 Seleziona anno:</span>
        <select id="yearSelect" class="year-select" onchange="changeYear()">
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
            <option value="2020">2020</option>
            <option value="2019">2019</option>
            <option value="2018">2018</option>
            <option value="2017">2017</option>
            <option value="2016">2016</option>
            <option value="2015">2015</option>
            <option value="2014">2014</option>
            <option value="2013">2013</option>
            <option value="2012">2012</option>
            <option value="2011">2011</option>
            <option value="2010">2010</option>
            <option value="2009">2009</option>
            <option value="2008">2008</option>
            <option value="2007">2007</option>
            <option value="2006">2006</option>
            <option value="2005">2005</option>
            <option value="2004">2004</option>
            <option value="2003">2003</option>
            <option value="2002">2002</option>
            <option value="2001">2001</option>
            <option value="2000">2000</option>
        </select>
    </div>

    <div id="genresContainer" class="genres"></div>

    <div id="results" class="grid"></div>

    <div class="pagination">
        <button onclick="prevPage()">◀ Prec</button>
        <span id="pageNumber">1 / 1</span>
        <button onclick="nextPage()">Succ ▶</button>
    </div>
</div>

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";

let currentPage = 1;
let selectedGenres = [];
let currentMediaType = "movie";
let searchQuery = "";
let totalPages = 1;
let currentOrder = "popular"; // popular, top_rated, latest
let currentYear = new Date().getFullYear();

const movieGenres = [
    { id: "28", name: "Azione" }, { id: "12", name: "Avventura" }, { id: "16", name: "Animazione" },
    { id: "35", name: "Commedia" }, { id: "80", name: "Crime" }, { id: "99", name: "Documentario" },
    { id: "18", name: "Dramma" }, { id: "10751", name: "Famiglia" }, { id: "14", name: "Fantasy" },
    { id: "36", name: "Storico" }, { id: "27", name: "Horror" }, { id: "10402", name: "Musica" },
    { id: "9648", name: "Mistero" }, { id: "10749", name: "Romance" }, { id: "878", name: "Fantascienza" },
    { id: "53", name: "Thriller" }, { id: "10752", name: "Guerra" }, { id: "37", name: "Western" }
];

const tvGenres = [
    { id: "10759", name: "Action" }, { id: "16", name: "Animazione" }, { id: "35", name: "Commedia" },
    { id: "80", name: "Crime" }, { id: "99", name: "Documentario" }, { id: "18", name: "Dramma" },
    { id: "10751", name: "Famiglia" }, { id: "10762", name: "Kids" }, { id: "9648", name: "Mistero" },
    { id: "10763", name: "News" }, { id: "10764", name: "Reality" }, { id: "10765", name: "Fantascienza" },
    { id: "10766", name: "Soap" }, { id: "10767", name: "Talk" }, { id: "10768", name: "Guerra" },
    { id: "37", name: "Western" }
];

window.onload = function() {
    loadContent();
    document.getElementById("searchInput").addEventListener("input", handleSearch);
};

function changeOrder(order) {
    currentOrder = order;
    currentPage = 1;
    
    // Aggiorna classe attiva dei bottoni ordine
    document.querySelectorAll(".order-btn").forEach(btn => {
        btn.classList.remove("active");
    });
    document.querySelector(`.order-btn[data-order="${order}"]`).classList.add("active");
    
    // Mostra/nascondi selettore anno
    const yearSelector = document.getElementById("yearSelector");
    if (order === 'latest') {
        yearSelector.style.display = "flex";
    } else {
        yearSelector.style.display = "none";
    }
    
    loadContent();
}

function changeYear() {
    const yearSelect = document.getElementById("yearSelect");
    currentYear = parseInt(yearSelect.value);
    currentPage = 1;
    loadContent();
}

function switchMediaType(type) {
    currentMediaType = type;
    currentPage = 1;
    selectedGenres = [];
    searchQuery = "";
    document.getElementById("searchInput").value = "";
    
    document.querySelectorAll(".media-btn").forEach(btn => btn.classList.remove("active"));
    document.querySelector(`[data-type="${type}"]`).classList.add("active");
    
    renderGenres();
    loadContent();
}

function renderGenres() {
    const genresContainer = document.getElementById("genresContainer");
    const genresList = currentMediaType === "movie" ? movieGenres : tvGenres;
    
    genresContainer.innerHTML = genresList.map(genre => `
        <button class="genre-btn" data-id="${genre.id}" onclick="toggleGenre('${genre.id}')">
            ${genre.name}
        </button>
    `).join("");
}

function toggleGenre(genreId) {
    const btn = document.querySelector(`.genre-btn[data-id="${genreId}"]`);
    
    if (selectedGenres.includes(genreId)) {
        selectedGenres = selectedGenres.filter(id => id !== genreId);
        btn.classList.remove("active");
    } else {
        selectedGenres.push(genreId);
        btn.classList.add("active");
    }
    
    currentPage = 1;
    loadContent();
}

function handleSearch() {
    searchQuery = document.getElementById("searchInput").value.trim();
    currentPage = 1;
    loadContent();
}

function clearSearch() {
    document.getElementById("searchInput").value = "";
    searchQuery = "";
    currentPage = 1;
    loadContent();
}

async function loadContent() {
    showLoading();
    
    try {
        let url = "";
        
        // Se c'è una ricerca
        if (searchQuery) {
            const searchType = currentMediaType === "movie" ? "movie" : "tv";
            url = `https://api.themoviedb.org/3/search/${searchType}?api_key=${API_KEY}&query=${encodeURIComponent(searchQuery)}&language=it-IT&page=${currentPage}`;
        } 
        // Se ci sono generi selezionati
        else if (selectedGenres.length > 0) {
            const genreQuery = selectedGenres.join(",");
            let sortBy = "";
            if (currentOrder === 'top_rated') {
                sortBy = 'vote_average.desc';
            } else if (currentOrder === 'latest') {
                sortBy = 'primary_release_date.desc';
            } else {
                sortBy = 'popularity.desc';
            }
            url = `https://api.themoviedb.org/3/discover/${currentMediaType}?api_key=${API_KEY}&with_genres=${genreQuery}&language=it-IT&page=${currentPage}&sort_by=${sortBy}`;
            
            // Aggiungi filtro anno se è selezionato "per anno"
            if (currentOrder === 'latest') {
                if (currentMediaType === 'movie') {
                    url += `&primary_release_year=${currentYear}`;
                } else {
                    url += `&first_air_date_year=${currentYear}`;
                }
            }
        }
        // Nessun filtro
        else {
            if (currentOrder === 'latest') {
                // Per anno specifico
                if (currentMediaType === 'movie') {
                    url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=it-IT&page=${currentPage}&sort_by=primary_release_date.desc&primary_release_year=${currentYear}`;
                } else {
                    url = `https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&language=it-IT&page=${currentPage}&sort_by=first_air_date.desc&first_air_date_year=${currentYear}`;
                }
            } else if (currentOrder === 'top_rated') {
                url = `https://api.themoviedb.org/3/${currentMediaType}/top_rated?api_key=${API_KEY}&language=it-IT&page=${currentPage}`;
            } else {
                url = `https://api.themoviedb.org/3/${currentMediaType}/popular?api_key=${API_KEY}&language=it-IT&page=${currentPage}`;
            }
        }
        
        const response = await fetch(url);
        const data = await response.json();
        
        totalPages = Math.min(data.total_pages, 500);
        displayItems(data.results);
        updatePageNumber();
    } catch (error) {
        console.error("Errore:", error);
        document.getElementById("results").innerHTML = '<div class="no-results">❌ Errore nel caricamento</div>';
    }
}

function showLoading() {
    document.getElementById("results").innerHTML = '<div class="loading">⏳ Caricamento in corso...</div>';
}

function displayItems(items) {
    const resultsDiv = document.getElementById("results");
    
    if (!items || items.length === 0) {
        resultsDiv.innerHTML = '<div class="no-results">😕 Nessun risultato trovato</div>';
        return;
    }
    
    resultsDiv.innerHTML = items.map(item => {
        const posterUrl = item.poster_path ? IMG_BASE + item.poster_path : "https://via.placeholder.com/500x750?text=No+Image";
        const title = currentMediaType === "movie" ? item.title : item.name;
        const date = currentMediaType === "movie" ? item.release_date : item.first_air_date;
        const year = date ? date.split("-")[0] : "N/D";
        const rating = item.vote_average ? item.vote_average.toFixed(1) : "N/A";
        const inList = isInList(item.id);
        
        return `
            <div class="card">
                <img src="${posterUrl}" alt="${title}" onclick="openDetailsPage(${item.id})" loading="lazy">
                <div class="card-content">
                    <h4>${escapeHtml(title)}</h4>
                    <div class="rating">⭐ ${rating}</div>
                    <p>📅 ${year}</p>
                    <button 
                        id="btn-${item.id}"
                        onclick="toggleList(${item.id}, '${escapeHtml(title)}', '${posterUrl}', ${item.vote_average || 0}, '${year}')"
                        style="background:${inList ? '#ef4444' : '#7c3aed'}"
                    >
                        ${inList ? "❌ Rimuovi" : "⭐ Aggiungi"}
                    </button>
                </div>
            </div>
        `;
    }).join("");
}

function openDetailsPage(id) {
    window.location.href = `${currentMediaType === "movie" ? "movie" : "tv"}.html?id=${id}`;
}

function getList() {
    return JSON.parse(localStorage.getItem("myMediaList")) || [];
}

function saveList(list) {
    localStorage.setItem("myMediaList", JSON.stringify(list));
}

function isInList(id) {
    return getList().some(item => item.id === id && item.type === currentMediaType);
}

function toggleList(id, title, poster, rating, year) {
    let list = getList();
    const exists = list.find(item => item.id === id && item.type === currentMediaType);
    
    if (exists) {
        list = list.filter(item => !(item.id === id && item.type === currentMediaType));
    } else {
        list.push({ 
            id, title, poster, rating, year,
            type: currentMediaType,
            mediaType: currentMediaType === "movie" ? "Film" : "Serie TV"
        });
    }
    
    saveList(list);
    
    const btn = document.getElementById(`btn-${id}`);
    if (btn) {
        const nowInList = !exists;
        btn.innerText = nowInList ? "❌ Rimuovi" : "⭐ Aggiungi";
        btn.style.background = nowInList ? "#ef4444" : "#7c3aed";
    }
}

function goHome() {
    searchQuery = "";
    selectedGenres = [];
    currentPage = 1;
    currentOrder = "popular";
    document.getElementById("searchInput").value = "";
    document.querySelectorAll(".genre-btn").forEach(btn => btn.classList.remove("active"));
    document.querySelectorAll(".order-btn").forEach(btn => btn.classList.remove("active"));
    document.querySelector(`.order-btn[data-order="popular"]`).classList.add("active");
    document.getElementById("yearSelector").style.display = "none";
    loadContent();
}

function goToList() {
    window.location.href = "list.html";
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        loadContent();
        window.scrollTo({ top: 0, behavior: "smooth" });
    }
}

function nextPage() {
    if (currentPage < totalPages) {
        currentPage++;
        loadContent();
        window.scrollTo({ top: 0, behavior: "smooth" });
    }
}

function updatePageNumber() {
    document.getElementById("pageNumber").innerText = `${currentPage} / ${totalPages}`;
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

renderGenres();
</script>

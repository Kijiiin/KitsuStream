<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KitsuStream - Dettaglio Film</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    min-height: 100vh;
}

/* ============================================ */
/* STILE MOBILE (default - fino a 768px) */
/* ============================================ */

/* Topbar mobile */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left, .topbar-right {
    width: auto;
}

.topbar-center {
    flex: 1;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.back-btn, .list-btn {
    background: rgba(124, 58, 237, 0.9);
    border: none;
    padding: 6px 12px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s ease;
}

.back-btn:active, .list-btn:active {
    transform: scale(0.95);
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 16px;
}

/* Movie details mobile */
.movie-details {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

.movie-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 20px;
}

.movie-poster {
    flex-shrink: 0;
}

.movie-poster img {
    width: 180px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.movie-info {
    flex: 1;
}

.movie-title {
    font-size: 24px;
    margin-bottom: 8px;
    color: #c084fc;
}

.movie-meta {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin: 12px 0;
    color: #aaa;
    font-size: 12px;
}

.rating {
    color: #ffd700;
    font-size: 14px;
}

.overview {
    margin: 16px 0;
    line-height: 1.5;
    color: #ddd;
    font-size: 13px;
    text-align: left;
}

.genres {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 16px 0;
}

.genre-tag {
    background: rgba(124, 58, 237, 0.3);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
}

.watch-buttons {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    justify-content: center;
}

.watch-btn, .list-toggle-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.watch-btn {
    background: #ef4444;
    color: white;
}

.watch-btn:active {
    transform: scale(0.96);
    background: #dc2626;
}

.list-toggle-btn {
    background: #7c3aed;
    color: white;
}

.list-toggle-btn:active {
    transform: scale(0.96);
    background: #6d28d9;
}

/* Sezioni mobile */
.info-section, .cast-section, .similar-section, .related-section {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-top: 16px;
}

.section-title {
    font-size: 18px;
    margin-bottom: 16px;
    color: #c084fc;
}

.info-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.info-card {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 10px;
}

.info-label {
    font-size: 10px;
    color: #888;
    margin-bottom: 4px;
}

.info-value {
    font-size: 12px;
    font-weight: bold;
    color: #c084fc;
    word-break: break-word;
}

/* Cast mobile */
.cast-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.cast-card {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
}

.cast-photo {
    width: 100%;
    height: 100px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 8px;
}

.cast-name {
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 4px;
}

.cast-character {
    font-size: 10px;
    color: #aaa;
}

/* Similar mobile */
.similar-grid, .related-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.similar-card, .related-card {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
}

.similar-poster, .related-poster {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.similar-info, .related-info {
    padding: 8px;
}

.similar-title, .related-title {
    font-size: 11px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.similar-year, .related-year {
    font-size: 9px;
    color: #888;
}

.related-badge {
    display: inline-block;
    background: #f59e0b;
    padding: 2px 6px;
    border-radius: 10px;
    font-size: 8px;
    margin-top: 4px;
}

/* Player mobile */
.player-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.player-box {
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.player-box iframe {
    width: 100%;
    height: 50vh;
    border: none;
}

.player-controls {
    padding: 12px;
    display: flex;
    justify-content: center;
    gap: 10px;
    background: #1a1a1a;
    flex-wrap: wrap;
}

.player-controls button {
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 12px;
    cursor: pointer;
    border: none;
    color: white;
}

.close-btn {
    background: #ef4444;
}

.save-btn {
    background: #f59e0b;
}

.reset-btn {
    background: #ef4444;
}

.saved-info {
    text-align: center;
    margin-top: 8px;
    min-height: 30px;
    padding: 0 15px 15px;
    font-size: 12px;
    transition: all 0.3s ease;
}

.loading {
    text-align: center;
    padding: 40px;
    font-size: 14px;
    color: #c084fc;
}

/* Torna su mobile */
#tornaSu {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    font-size: 20px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(124,58,237,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
    z-index: 9998;
}

#tornaSu:active {
    transform: scale(0.92);
}

/* ============================================ */
/* STILE DESKTOP (sopra i 768px) */
/* ============================================ */

@media (min-width: 769px) {
    
    /* Topbar desktop */
    .topbar {
        padding: 20px 30px;
        background: rgba(0,0,0,0.3);
    }
    
    .topbar-left, .topbar-right {
        width: 120px;
    }
    
    .topbar-center {
        flex: 1;
    }
    
    h1 {
        font-size: 28px;
        text-shadow: 0 0 20px rgba(124,58,237,0.3);
    }
    
    .back-btn, .list-btn {
        padding: 10px 20px;
        font-size: 14px;
    }
    
    .back-btn:hover, .list-btn:hover {
        transform: translateY(-2px);
        background: #7c3aed;
    }
    
    .container {
        padding: 30px;
        margin: 40px auto;
    }
    
    /* Movie details desktop */
    .movie-details {
        padding: 30px;
        margin-bottom: 40px;
        border-radius: 20px;
    }
    
    .movie-header {
        flex-direction: row;
        align-items: flex-start;
        text-align: left;
        gap: 30px;
    }
    
    .movie-poster img {
        width: 300px;
        border-radius: 15px;
    }
    
    .movie-title {
        font-size: 32px;
    }
    
    .movie-meta {
        justify-content: flex-start;
        gap: 20px;
        font-size: 14px;
    }
    
    .rating {
        font-size: 18px;
    }
    
    .overview {
        font-size: 16px;
        text-align: left;
    }
    
    .genres {
        justify-content: flex-start;
        gap: 10px;
    }
    
    .genre-tag {
        padding: 5px 15px;
        font-size: 12px;
    }
    
    .watch-buttons {
        justify-content: flex-start;
        gap: 15px;
    }
    
    .watch-btn, .list-toggle-btn {
        padding: 12px 30px;
        font-size: 16px;
    }
    
    .watch-btn:hover {
        transform: translateY(-2px);
        background: #dc2626;
    }
    
    .list-toggle-btn:hover {
        transform: translateY(-2px);
        background: #6d28d9;
    }
    
    /* Sezioni desktop */
    .info-section, .cast-section, .similar-section, .related-section {
        padding: 30px;
        margin-top: 30px;
        border-radius: 20px;
    }
    
    .section-title {
        font-size: 24px;
        margin-bottom: 20px;
    }
    
    .info-grid {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }
    
    .info-card {
        padding: 15px;
    }
    
    .info-label {
        font-size: 12px;
    }
    
    .info-value {
        font-size: 16px;
    }
    
    /* Cast desktop */
    .cast-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 20px;
    }
    
    .cast-card {
        padding: 15px;
        transition: all 0.3s ease;
    }
    
    .cast-card:hover {
        background: rgba(124, 58, 237, 0.3);
        transform: translateY(-3px);
    }
    
    .cast-photo {
        height: 150px;
        border-radius: 10px;
    }
    
    .cast-name {
        font-size: 14px;
    }
    
    .cast-character {
        font-size: 12px;
    }
    
    /* Similar desktop */
    .similar-grid, .related-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 20px;
    }
    
    .similar-card, .related-card {
        border-radius: 12px;
        transition: all 0.3s ease;
    }
    
    .similar-card:hover, .related-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    
    .similar-poster, .related-poster {
        height: 225px;
    }
    
    .similar-info, .related-info {
        padding: 10px;
    }
    
    .similar-title, .related-title {
        font-size: 12px;
    }
    
    .similar-year, .related-year {
        font-size: 10px;
    }
    
    /* Player desktop */
    .player-box {
        width: 90%;
        max-width: 1100px;
        height: auto;
        border-radius: 15px;
    }
    
    .player-box iframe {
        height: 60vh;
        min-height: 400px;
    }
    
    .player-controls {
        padding: 15px;
        gap: 10px;
    }
    
    .player-controls button {
        padding: 8px 20px;
        font-size: 14px;
    }
    
    .loading {
        padding: 50px;
        font-size: 18px;
    }
    
    /* Torna su desktop */
    #tornaSu {
        bottom: 30px;
        right: 30px;
        width: 50px;
        height: 50px;
        font-size: 24px;
        transition: 0.3s;
    }
    
    #tornaSu:hover {
        transform: translateY(-5px);
        background: linear-gradient(135deg, #a855f7, #c084fc);
        box-shadow: 0 6px 20px rgba(124,58,237,0.8);
    }
}

/* Tablet (769px - 1024px) */
@media (min-width: 769px) and (max-width: 1024px) {
    .cast-grid, .similar-grid, .related-grid {
        grid-template-columns: repeat(3, 1fr);
    }
    
    .info-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Animazioni */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.movie-details, .info-section, .cast-section, .similar-section, .related-section {
    animation: fadeIn 0.3s ease;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left">
        <button class="back-btn" onclick="goBack()">⬅️</button>
    </div>
    <div class="topbar-center">
        <h1>🎬 KitsuStream</h1>
    </div>
    <div class="topbar-right">
        <button class="list-btn" onclick="goToList()">⭐</button>
    </div>
</div>

<div class="container">
    <div id="movieDetails" class="movie-details">
        <div class="loading">Caricamento...</div>
    </div>
</div>

<!-- PLAYER -->
<div id="playerModal" class="player-modal" onclick="handleOutsideClick(event)">
    <div class="player-box" id="playerBox">
        <iframe id="videoFrame" allowfullscreen></iframe>
        <div class="player-controls">
            <button class="save-btn" onclick="saveCurrentSpot()">💾 Salva posizione</button>
            <button class="reset-btn" onclick="resetSavedSpot()">🗑 Reset</button>
            <button class="close-btn" onclick="closePlayer()">❌ Chiudi</button>
        </div>
        <div id="savedInfo" class="saved-info"></div>
    </div>
</div>

<!-- PULSANTE TORNA SU -->
<button id="tornaSu" title="Torna su">↑</button>

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";
const BACKDROP_BASE = "https://image.tmdb.org/t/p/original";

let movieId = null;
let movieData = null;
let currentVideoUrl = "";

function getMovieIdFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
}

async function loadMovieDetails() {
    movieId = getMovieIdFromURL();
    
    if (!movieId) {
        document.getElementById("movieDetails").innerHTML = '<div class="loading">❌ ID film non valido</div>';
        return;
    }
    
    try {
        const response = await fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${API_KEY}&language=it-IT&append_to_response=credits,similar,release_dates`);
        const data = await response.json();
        movieData = data;
        
        displayMovieDetails(data);
        loadAdditionalInfo(data);
        loadRelatedMovies(data);
        loadSimilar(data.similar);
        loadCast(data.credits);
        
    } catch (error) {
        console.error("Errore:", error);
        document.getElementById("movieDetails").innerHTML = '<div class="loading">❌ Errore nel caricamento</div>';
    }
}

function displayMovieDetails(movie) {
    const posterUrl = movie.poster_path ? IMG_BASE + movie.poster_path : "https://via.placeholder.com/300x450?text=No+Image";
    const backdropUrl = movie.backdrop_path ? BACKDROP_BASE + movie.backdrop_path : "";
    
    const inList = isInList(movie.id);
    const link = `https://vixsrc.to/movie/${movie.id}?lang=it`;
    
    const html = `
        <div class="movie-header">
            <div class="movie-poster">
                <img src="${posterUrl}" alt="${movie.title}" loading="lazy">
            </div>
            <div class="movie-info">
                <h2 class="movie-title">${escapeHtml(movie.title)}</h2>
                <div class="movie-meta">
                    <span>📅 ${movie.release_date ? movie.release_date.split("-")[0] : "N/D"}</span>
                    <span>⭐ <span class="rating">${movie.vote_average ? movie.vote_average.toFixed(1) : "N/A"}/10</span></span>
                    <span>⏱️ ${movie.runtime ? movie.runtime + " min" : "N/D"}</span>
                    <span>🎬 ${movie.status || "N/D"}</span>
                </div>
                <div class="genres">
                    ${movie.genres ? movie.genres.map(g => `<span class="genre-tag">${g.name}</span>`).join("") : ""}
                </div>
                <div class="overview">
                    <strong>Trama:</strong><br>
                    ${movie.overview || "Trama non disponibile."}
                </div>
                <div class="watch-buttons">
                    <button class="watch-btn" onclick="openPlayer('${link}')">▶ Guarda</button>
                    <button class="list-toggle-btn" id="listBtn" onclick="toggleListFromDetails('${link}')">
                        ${inList ? "❌ Rimuovi" : "⭐ Aggiungi"}
                    </button>
                </div>
            </div>
        </div>
    `;
    
    document.getElementById("movieDetails").innerHTML = html;
    
    if (backdropUrl && window.innerWidth > 768) {
        document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url(${backdropUrl})`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundAttachment = "fixed";
    }
}

function loadAdditionalInfo(movie) {
    const infoHtml = `
        <div class="info-section">
            <h3 class="section-title">ℹ️ Informazioni</h3>
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label">Titolo originale</div>
                    <div class="info-value">${escapeHtml(movie.original_title || "N/D")}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Budget</div>
                    <div class="info-value">${movie.budget ? "💰 $" + movie.budget.toLocaleString() : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Incassi</div>
                    <div class="info-value">${movie.revenue ? "💵 $" + movie.revenue.toLocaleString() : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Popolarità</div>
                    <div class="info-value">${movie.popularity ? "📊 " + Math.round(movie.popularity) : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Lingua originale</div>
                    <div class="info-value">${movie.original_language ? movie.original_language.toUpperCase() : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Produzione</div>
                    <div class="info-value">${movie.production_companies && movie.production_companies[0] ? movie.production_companies[0].name : "N/D"}</div>
                </div>
            </div>
        </div>
    `;
    
    document.getElementById("movieDetails").insertAdjacentHTML("beforeend", infoHtml);
}

async function loadRelatedMovies(movie) {
    try {
        // Recupera i film correlati (prequel, sequel, spin-off)
        const response = await fetch(`https://api.themoviedb.org/3/movie/${movie.id}/recommendations?api_key=${API_KEY}&language=it-IT`);
        const recommendations = await response.json();
        
        // Cerca anche i film della stessa collezione
        let collectionMovies = [];
        if (movie.belongs_to_collection) {
            const collectionResponse = await fetch(`https://api.themoviedb.org/3/collection/${movie.belongs_to_collection.id}?api_key=${API_KEY}&language=it-IT`);
            const collectionData = await collectionResponse.json();
            collectionMovies = collectionData.parts || [];
            // Filtra per rimuovere il film corrente
            collectionMovies = collectionMovies.filter(m => m.id != movie.id);
        }
        
        // Unisci e rimuovi duplicati
        let allRelated = [...recommendations.results, ...collectionMovies];
        const uniqueRelated = [];
        const ids = new Set();
        
        for (const movie of allRelated) {
            if (!ids.has(movie.id) && movie.id != movieId) {
                ids.add(movie.id);
                uniqueRelated.push(movie);
            }
        }
        
        // Prendi i primi 6 correlati
        const relatedMovies = uniqueRelated.slice(0, 6);
        
        if (relatedMovies.length > 0) {
            displayRelatedMovies(relatedMovies);
        }
    } catch (error) {
        console.error("Errore nel caricamento film correlati:", error);
    }
}

function displayRelatedMovies(movies) {
    const relatedHtml = `
        <div class="related-section">
            <h3 class="section-title">🔗 Film correlati</h3>
            <div class="related-grid">
                ${movies.map(movie => `
                    <div class="related-card" onclick="openMoviePage(${movie.id})">
                        <img class="related-poster" src="${movie.poster_path ? IMG_BASE + movie.poster_path : 'https://via.placeholder.com/150x225?text=No+Poster'}" alt="${movie.title}" loading="lazy">
                        <div class="related-info">
                            <div class="related-title">${escapeHtml(movie.title)}</div>
                            <div class="related-year">${movie.release_date ? movie.release_date.split("-")[0] : "N/D"} | ⭐ ${movie.vote_average ? movie.vote_average.toFixed(1) : "N/A"}</div>
                        </div>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
    
    document.getElementById("movieDetails").insertAdjacentHTML("beforeend", relatedHtml);
}

function loadSimilar(similar) {
    if (!similar || !similar.results || similar.results.length === 0) return;
    
    const similarMovies = similar.results.slice(0, 6);
    
    const similarHtml = `
        <div class="similar-section">
            <h3 class="section-title">🎬 Ti potrebbe piacere</h3>
            <div class="similar-grid">
                ${similarMovies.map(movie => `
                    <div class="similar-card" onclick="openMoviePage(${movie.id})">
                        <img class="similar-poster" src="${movie.poster_path ? IMG_BASE + movie.poster_path : 'https://via.placeholder.com/150x225?text=No+Poster'}" alt="${movie.title}" loading="lazy">
                        <div class="similar-info">
                            <div class="similar-title">${escapeHtml(movie.title)}</div>
                            <div class="similar-year">${movie.release_date ? movie.release_date.split("-")[0] : "N/D"} | ⭐ ${movie.vote_average ? movie.vote_average.toFixed(1) : "N/A"}</div>
                        </div>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
    
    document.getElementById("movieDetails").insertAdjacentHTML("beforeend", similarHtml);
}

function loadCast(credits) {
    if (!credits || !credits.cast || credits.cast.length === 0) return;
    
    const mainCast = credits.cast.slice(0, 8);
    
    const castHtml = `
        <div class="cast-section">
            <h3 class="section-title">🎭 Cast</h3>
            <div class="cast-grid">
                ${mainCast.map(actor => `
                    <div class="cast-card">
                        <img class="cast-photo" src="${actor.profile_path ? IMG_BASE + actor.profile_path : 'https://via.placeholder.com/150x150?text=No+Photo'}" alt="${actor.name}" loading="lazy">
                        <div class="cast-name">${escapeHtml(actor.name)}</div>
                        <div class="cast-character">${escapeHtml(actor.character)}</div>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
    
    document.getElementById("movieDetails").insertAdjacentHTML("beforeend", castHtml);
}

function openMoviePage(id) {
    window.location.href = `movie.html?id=${id}`;
}

function getList() {
    return JSON.parse(localStorage.getItem("myMediaList")) || [];
}

function saveList(list) {
    localStorage.setItem("myMediaList", JSON.stringify(list));
}

function isInList(id) {
    return getList().some(item => item.id === id && item.type === "movie");
}

function toggleListFromDetails(link) {
    if (!movieData) return;
    
    let list = getList();
    const exists = list.find(item => item.id === movieData.id && item.type === "movie");
    
    if (exists) {
        list = list.filter(item => !(item.id === movieData.id && item.type === "movie"));
    } else {
        list.push({
            id: movieData.id,
            title: movieData.title,
            poster: movieData.poster_path ? IMG_BASE + movieData.poster_path : "",
            rating: movieData.vote_average,
            year: movieData.release_date ? movieData.release_date.split("-")[0] : "N/D",
            type: "movie",
            mediaType: "Film",
            link: link
        });
    }
    
    saveList(list);
    
    const btn = document.getElementById("listBtn");
    const nowInList = !exists;
    btn.innerHTML = nowInList ? "❌ Rimuovi" : "⭐ Aggiungi";
    btn.style.background = nowInList ? "#ef4444" : "#7c3aed";
}

/* ============================================ */
/* FUNZIONI SALVATAGGIO POSIZIONE */
/* ============================================ */

function formatTime(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    
    if (h > 0) {
        return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    } else {
        return `${m}:${s.toString().padStart(2, '0')}`;
    }
}

function parseTimeInput(input) {
    input = input.trim().replace(',', '.');
    
    if (input.includes(':') && input.split(':').length === 3) {
        const parts = input.split(':');
        const ore = parseInt(parts[0]);
        const minuti = parseInt(parts[1]);
        const secondi = parseInt(parts[2]);
        
        if (!isNaN(ore) && !isNaN(minuti) && !isNaN(secondi) && ore >= 0 && minuti >= 0 && minuti < 60 && secondi >= 0 && secondi < 60) {
            return { success: true, seconds: (ore * 3600) + (minuti * 60) + secondi };
        }
    }
    else if (input.includes(':') && input.split(':').length === 2) {
        const parts = input.split(':');
        const ore = parseInt(parts[0]);
        const minuti = parseInt(parts[1]);
        
        if (!isNaN(ore) && !isNaN(minuti) && ore >= 0 && minuti >= 0 && minuti < 60) {
            return { success: true, seconds: (ore * 3600) + (minuti * 60) };
        }
    }
    else if (input.includes('.')) {
        let minuti = parseFloat(input);
        if (!isNaN(minuti) && minuti >= 0) {
            return { success: true, seconds: Math.floor(minuti * 60) };
        }
    }
    else {
        let minuti = parseFloat(input);
        if (!isNaN(minuti) && minuti >= 0) {
            return { success: true, seconds: Math.floor(minuti * 60) };
        }
    }
    
    return { success: false, seconds: 0 };
}

function saveCurrentSpot() {
    if (!currentVideoUrl) {
        alert("⚠️ Apri prima un video!");
        return;
    }
    
    const helpText = "Formati supportati:\n\n" +
                     "• Minuti: 15.30 (15 minuti e 30 secondi)\n" +
                     "• Ore:Minuti: 1:30 (1 ora e 30 minuti)\n" +
                     "• Ore:Minuti:Secondi: 1:30:15\n\n" +
                     "Esempi: 15.30, 1:30, 1:30:15";
    
    const input = prompt("A che punto sei?\n\n" + helpText);
    
    if (input === null) return;
    
    const result = parseTimeInput(input);
    
    if (!result.success) {
        alert("❌ Formato non valido!\n\n" + helpText);
        return;
    }
    
    const secondi = result.seconds;
    localStorage.setItem(`time_movie_${currentVideoUrl}`, secondi);
    
    const savedInfo = document.getElementById("savedInfo");
    const timeString = formatTime(secondi);
    savedInfo.innerHTML = `✅ Salvato! Riprenderò da ${timeString}`;
    savedInfo.style.color = "#4ade80";
    
    setTimeout(() => {
        if (document.getElementById("playerModal").style.display === "flex") {
            savedInfo.innerHTML = `📌 Posizione salvata: ${timeString}`;
            savedInfo.style.color = "#f59e0b";
        }
    }, 3000);
    
    alert(`✅ Posizione salvata: ${timeString}`);
}

function resetSavedSpot() {
    if (!currentVideoUrl) {
        alert("⚠️ Apri prima un video!");
        return;
    }
    
    const savedTime = localStorage.getItem(`time_movie_${currentVideoUrl}`);
    if (!savedTime) {
        alert("⚠️ Nessun salvataggio trovato per questo video!");
        return;
    }
    
    if (confirm("Sei sicuro di voler cancellare la posizione salvata?")) {
        localStorage.removeItem(`time_movie_${currentVideoUrl}`);
        
        const savedInfo = document.getElementById("savedInfo");
        savedInfo.innerHTML = `🗑 Salvataggio rimosso! Il video ripartirà dall'inizio`;
        savedInfo.style.color = "#ef4444";
        
        setTimeout(() => {
            if (document.getElementById("playerModal").style.display === "flex") {
                savedInfo.innerHTML = `🎬 Nessun salvataggio - riparto dall'inizio`;
                savedInfo.style.color = "#888";
            }
        }, 3000);
        
        alert("✅ Posizione cancellata!");
    }
}

function openPlayer(url) {
    const modal = document.getElementById("playerModal");
    const frame = document.getElementById("videoFrame");
    
    currentVideoUrl = url;
    const savedTime = localStorage.getItem(`time_movie_${url}`);
    let finalUrl = url;
    let savedInfo = document.getElementById("savedInfo");
    
    if (savedTime && parseInt(savedTime) > 0) {
        const secondi = parseInt(savedTime);
        const timeString = formatTime(secondi);
        finalUrl += `&startAt=${secondi}`;
        savedInfo.innerHTML = `📌 Riprenderò da ${timeString}`;
        savedInfo.style.color = "#f59e0b";
    } else {
        savedInfo.innerHTML = `🎬 Nessun salvataggio - riparto dall'inizio`;
        savedInfo.style.color = "#888";
    }
    
    frame.src = finalUrl;
    modal.style.display = "flex";
}

function closePlayer() {
    const frame = document.getElementById("videoFrame");
    frame.src = "";
    document.getElementById("playerModal").style.display = "none";
    document.getElementById("savedInfo").innerHTML = "";
    currentVideoUrl = "";
    
    if (document.fullscreenElement) {
        document.exitFullscreen();
    }
}

function handleOutsideClick(e) {
    const box = document.getElementById("playerBox");
    if (!box.contains(e.target)) closePlayer();
}

function goBack() {
    window.history.back();
}

function goToList() {
    window.location.href = "list.html";
}

function escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

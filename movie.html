<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KitsuStream - Dettaglio Film</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    min-height: 100vh;
}

.topbar {
    display: flex;
    align-items: center;
    padding: 20px 30px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left, .topbar-right {
    width: 120px;
}

.topbar-center {
    flex: 1;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: 28px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 20px rgba(124,58,237,0.3);
}

.back-btn, .list-btn {
    background: rgba(124, 58, 237, 0.8);
    border: none;
    padding: 10px 20px;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
}

.back-btn:hover, .list-btn:hover {
    background: #7c3aed;
    transform: translateY(-2px);
}

.container {
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 30px;
}

.movie-details {
    background: rgba(31, 27, 58, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 40px;
}

.movie-header {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
}

.movie-poster {
    flex-shrink: 0;
}

.movie-poster img {
    width: 300px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.movie-info {
    flex: 1;
}

.movie-title {
    font-size: 32px;
    margin-bottom: 10px;
    color: #c084fc;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.movie-meta {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin: 15px 0;
    color: #aaa;
}

.rating {
    color: #ffd700;
    font-size: 18px;
}

.overview {
    margin: 20px 0;
    line-height: 1.6;
    color: #ddd;
}

.genres {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 20px 0;
}

.genre-tag {
    background: rgba(124, 58, 237, 0.3);
    padding: 5px 15px;
    border-radius: 20px;
    font-size: 12px;
}

.watch-buttons {
    display: flex;
    gap: 15px;
    margin-top: 25px;
    flex-wrap: wrap;
}

.watch-btn, .list-toggle-btn {
    padding: 12px 30px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.watch-btn {
    background: #ef4444;
    color: white;
}

.watch-btn:hover {
    background: #dc2626;
    transform: translateY(-2px);
}

.list-toggle-btn {
    background: #7c3aed;
    color: white;
}

.list-toggle-btn:hover {
    background: #6d28d9;
    transform: translateY(-2px);
}

.italian-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: normal;
}

.italian-badge.available {
    background: #22c55e;
}

.italian-badge.not-available {
    background: #ef4444;
}

/* Sezione Info Aggiuntive */
.info-section {
    background: rgba(31, 27, 58, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    margin-top: 30px;
}

.section-title {
    font-size: 24px;
    margin-bottom: 20px;
    color: #c084fc;
}

.info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.info-card {
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 15px;
}

.info-label {
    font-size: 12px;
    color: #888;
    margin-bottom: 5px;
}

.info-value {
    font-size: 16px;
    font-weight: bold;
    color: #c084fc;
}

/* Sezione Cast */
.cast-section {
    background: rgba(31, 27, 58, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    margin-top: 30px;
}

.cast-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.cast-card {
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    transition: all 0.3s ease;
}

.cast-card:hover {
    background: rgba(124, 58, 237, 0.3);
    transform: translateY(-3px);
}

.cast-photo {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 10px;
}

.cast-name {
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 5px;
}

.cast-character {
    font-size: 12px;
    color: #aaa;
}

/* Sezione Simili */
.similar-section {
    background: rgba(31, 27, 58, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    margin-top: 30px;
}

.similar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.similar-card {
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s ease;
}

.similar-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.similar-poster {
    width: 100%;
    height: 225px;
    object-fit: cover;
}

.similar-info {
    padding: 10px;
}

.similar-title {
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.similar-year {
    font-size: 10px;
    color: #888;
}

/* PLAYER */
.player-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.player-box {
    width: 90%;
    max-width: 1100px;
    background: #000;
    border-radius: 15px;
    overflow: hidden;
}

.player-box iframe {
    width: 100%;
    height: 60vh;
    min-height: 400px;
    border: none;
}

.player-controls {
    padding: 15px;
    display: flex;
    justify-content: space-between;
    background: #1a1a1a;
    flex-wrap: wrap;
    gap: 10px;
}

.player-controls button {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.close-btn {
    background: #ef4444;
}

.fullscreen-btn {
    background: #00d4ff;
}

.save-btn {
    background: #f59e0b;
}

.reset-btn {
    background: #ef4444;
}

.loading {
    text-align: center;
    padding: 50px;
    font-size: 18px;
    color: #c084fc;
}

/* TORNA SU */
#tornaSu {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    font-size: 24px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(124,58,237,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    z-index: 9998;
}

#tornaSu:hover {
    transform: translateY(-5px);
    background: linear-gradient(135deg, #a855f7, #c084fc);
    box-shadow: 0 6px 20px rgba(124,58,237,0.8);
}

@media (max-width: 768px) {
    .movie-header {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
    
    .movie-poster img {
        width: 200px;
    }
    
    .movie-title {
        font-size: 24px;
        justify-content: center;
    }
    
    .container {
        padding: 0 20px;
    }
    
    .player-box iframe {
        height: 40vh;
    }
    
    h1 {
        font-size: 20px;
    }
    
    .topbar-left, .topbar-right {
        width: 70px;
    }
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left">
        <button class="back-btn" onclick="goBack()">⬅️ Indietro</button>
    </div>
    <div class="topbar-center">
        <h1>🎬 KitsuStream</h1>
    </div>
    <div class="topbar-right">
        <button class="list-btn" onclick="goToList()">⭐ Lista</button>
    </div>
</div>

<div class="container">
    <div id="movieDetails" class="movie-details">
        <div class="loading">Caricamento...</div>
    </div>
</div>

<!-- PLAYER -->
<div id="playerModal" class="player-modal" onclick="handleOutsideClick(event)">
    <div class="player-box" id="playerBox">
        <iframe id="videoFrame" allowfullscreen></iframe>
        <div class="player-controls">
            <button class="fullscreen-btn" onclick="toggleFullscreen()">🖥 Schermo intero</button>
            <button class="save-btn" onclick="saveCurrentSpot()">💾 Salva posizione</button>
            <button class="reset-btn" onclick="resetSavedSpot()">🗑 Reset posizione</button>
            <button class="close-btn" onclick="closePlayer()">❌ Chiudi</button>
        </div>
        <div id="savedInfo" style="text-align: center; margin-top: 8px; min-height: 30px; padding: 0 15px 15px;"></div>
    </div>
</div>

<!-- PULSANTE TORNA SU -->
<button id="tornaSu" title="Torna su">↑</button>

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";
const BACKDROP_BASE = "https://image.tmdb.org/t/p/original";

let movieId = null;
let movieData = null;
let currentVideoUrl = "";

function getMovieIdFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
}

async function checkItalianAvailability(type, id) {
    try {
        const url = `https://vixsrc.to/api/list/${type}?lang=it`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data && data.results) {
            const found = data.results.some(item => item.id == id);
            return found;
        }
        return false;
    } catch (error) {
        console.error("Errore verifica disponibilità italiana:", error);
        return false;
    }
}

async function loadMovieDetails() {
    movieId = getMovieIdFromURL();
    
    if (!movieId) {
        document.getElementById("movieDetails").innerHTML = '<div class="loading">❌ ID film non valido</div>';
        return;
    }
    
    try {
        const response = await fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${API_KEY}&language=it-IT&append_to_response=credits,similar,release_dates`);
        const data = await response.json();
        movieData = data;
        
        const hasItalian = await checkItalianAvailability('movie', movieId);
        
        displayMovieDetails(data, hasItalian);
        loadAdditionalInfo(data, hasItalian);
        loadCast(data.credits);
        loadSimilar(data.similar);
        
    } catch (error) {
        console.error("Errore:", error);
        document.getElementById("movieDetails").innerHTML = '<div class="loading">❌ Errore nel caricamento</div>';
    }
}

function displayMovieDetails(movie, hasItalian) {
    const posterUrl = movie.poster_path ? IMG_BASE + movie.poster_path : "https://via.placeholder.com/300x450?text=No+Image";
    const backdropUrl = movie.backdrop_path ? BACKDROP_BASE + movie.backdrop_path : "";
    
    const inList = isInList(movie.id);
    const link = `https://vixsrc.to/movie/${movie.id}?lang=it`;
    
    const italianBadge = hasItalian ? 
        '<span class="italian-badge available">🇮🇹 ITALIANO DISPONIBILE</span>' : 
        '<span class="italian-badge not-available">⚠️ ITALIANO NON DISPONIBILE</span>';
    
    const html = `
        <div class="movie-header">
            <div class="movie-poster">
                <img src="${posterUrl}" alt="${movie.title}">
            </div>
            <div class="movie-info">
                <h2 class="movie-title">${escapeHtml(movie.title)} ${italianBadge}</h2>
                <div class="movie-meta">
                    <span>📅 ${movie.release_date ? movie.release_date.split("-")[0] : "N/D"}</span>
                    <span>⭐ <span class="rating">${movie.vote_average ? movie.vote_average.toFixed(1) : "N/A"}/10</span></span>
                    <span>⏱️ ${movie.runtime ? movie.runtime + " min" : "N/D"}</span>
                    <span>🎬 ${movie.status || "N/D"}</span>
                </div>
                <div class="genres">
                    ${movie.genres ? movie.genres.map(g => `<span class="genre-tag">${g.name}</span>`).join("") : ""}
                </div>
                <div class="overview">
                    <strong>Trama:</strong><br>
                    ${movie.overview || "Trama non disponibile."}
                </div>
                <div class="watch-buttons">
                    <button class="watch-btn" onclick="openPlayer('${link}')">▶ Guarda ora</button>
                    <button class="list-toggle-btn" id="listBtn" onclick="toggleListFromDetails('${link}')">
                        ${inList ? "❌ Rimuovi dalla lista" : "⭐ Aggiungi alla lista"}
                    </button>
                </div>
            </div>
        </div>
    `;
    
    document.getElementById("movieDetails").innerHTML = html;
    
    if (backdropUrl) {
        document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url(${backdropUrl})`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundAttachment = "fixed";
    }
}

function loadAdditionalInfo(movie, hasItalian) {
    const italianStatus = hasItalian ? 
        '<span style="color: #22c55e;">✅ Disponibile in italiano</span>' : 
        '<span style="color: #ef4444;">❌ Non disponibile in italiano</span>';
    
    const infoHtml = `
        <div class="info-section">
            <h3 class="section-title">ℹ️ Informazioni aggiuntive</h3>
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label">Titolo originale</div>
                    <div class="info-value">${escapeHtml(movie.original_title || "N/D")}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Lingua italiana</div>
                    <div class="info-value">${italianStatus}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Budget</div>
                    <div class="info-value">${movie.budget ? "💰 $" + movie.budget.toLocaleString() : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Incassi</div>
                    <div class="info-value">${movie.revenue ? "💵 $" + movie.revenue.toLocaleString() : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Popolarità</div>
                    <div class="info-value">${movie.popularity ? "📊 " + Math.round(movie.popularity) : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Lingua originale</div>
                    <div class="info-value">${movie.original_language ? movie.original_language.toUpperCase() : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Produzione</div>
                    <div class="info-value">${movie.production_companies && movie.production_companies[0] ? movie.production_companies[0].name : "N/D"}</div>
                </div>
            </div>
        </div>
    `;
    
    document.getElementById("movieDetails").insertAdjacentHTML("beforeend", infoHtml);
}

function loadCast(credits) {
    if (!credits || !credits.cast || credits.cast.length === 0) return;
    
    const mainCast = credits.cast.slice(0, 8);
    
    const castHtml = `
        <div class="cast-section">
            <h3 class="section-title">🎭 Cast principale</h3>
            <div class="cast-grid">
                ${mainCast.map(actor => `
                    <div class="cast-card">
                        <img class="cast-photo" src="${actor.profile_path ? IMG_BASE + actor.profile_path : 'https://via.placeholder.com/150x150?text=No+Photo'}" alt="${actor.name}">
                        <div class="cast-name">${escapeHtml(actor.name)}</div>
                        <div class="cast-character">${escapeHtml(actor.character)}</div>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
    
    document.getElementById("movieDetails").insertAdjacentHTML("beforeend", castHtml);
}

function loadSimilar(similar) {
    if (!similar || !similar.results || similar.results.length === 0) return;
    
    const similarMovies = similar.results.slice(0, 6);
    
    const similarHtml = `
        <div class="similar-section">
            <h3 class="section-title">🎬 Film simili</h3>
            <div class="similar-grid">
                ${similarMovies.map(movie => `
                    <div class="similar-card" onclick="openMoviePage(${movie.id})">
                        <img class="similar-poster" src="${movie.poster_path ? IMG_BASE + movie.poster_path : 'https://via.placeholder.com/150x225?text=No+Poster'}" alt="${movie.title}">
                        <div class="similar-info">
                            <div class="similar-title">${escapeHtml(movie.title)}</div>
                            <div class="similar-year">${movie.release_date ? movie.release_date.split("-")[0] : "N/D"}</div>
                            <div class="similar-year">⭐ ${movie.vote_average ? movie.vote_average.toFixed(1) : "N/A"}</div>
                        </div>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
    
    document.getElementById("movieDetails").insertAdjacentHTML("beforeend", similarHtml);
}

function openMoviePage(id) {
    window.location.href = `movie.html?id=${id}`;
}

function getList() {
    return JSON.parse(localStorage.getItem("myMediaList")) || [];
}

function saveList(list) {
    localStorage.setItem("myMediaList", JSON.stringify(list));
}

function isInList(id) {
    return getList().some(item => item.id === id && item.type === "movie");
}

function toggleListFromDetails(link) {
    if (!movieData) return;
    
    let list = getList();
    const exists = list.find(item => item.id === movieData.id && item.type === "movie");
    
    if (exists) {
        list = list.filter(item => !(item.id === movieData.id && item.type === "movie"));
    } else {
        list.push({
            id: movieData.id,
            title: movieData.title,
            poster: movieData.poster_path ? IMG_BASE + movieData.poster_path : "",
            rating: movieData.vote_average,
            year: movieData.release_date ? movieData.release_date.split("-")[0] : "N/D",
            type: "movie",
            mediaType: "Film",
            link: link
        });
    }
    
    saveList(list);
    
    const btn = document.getElementById("listBtn");
    const nowInList = !exists;
    btn.innerHTML = nowInList ? "❌ Rimuovi dalla lista" : "⭐ Aggiungi alla lista";
    btn.style.background = nowInList ? "#ef4444" : "#7c3aed";
}

/* PLAYER */
function openPlayer(url) {
    const modal = document.getElementById("playerModal");
    const frame = document.getElementById("videoFrame");
    
    const savedTime = localStorage.getItem("time_movie_" + url);
    let finalUrl = url;
    let savedInfo = document.getElementById("savedInfo");
    
    if (savedTime && parseInt(savedTime) > 0) {
        const secondi = parseInt(savedTime);
        const minuti = Math.floor(secondi / 60);
        const secondiRestanti = secondi % 60;
        finalUrl += `&startAt=${secondi}`;
        savedInfo.innerHTML = `📌 Riprenderò da ${minuti}:${secondiRestanti.toString().padStart(2,'0')} (${secondi} secondi)`;
        savedInfo.style.color = "#f59e0b";
    } else {
        savedInfo.innerHTML = `🎬 Nessun salvataggio - il video partirà dall'inizio`;
        savedInfo.style.color = "#888";
    }
    
    currentVideoUrl = url;
    frame.src = finalUrl;
    modal.style.display = "flex";
}

function closePlayer() {
    const frame = document.getElementById("videoFrame");
    frame.src = "";
    document.getElementById("playerModal").style.display = "none";
    document.getElementById("savedInfo").innerHTML = "";
    
    if (document.fullscreenElement) {
        document.exitFullscreen();
    }
}

function handleOutsideClick(e) {
    const box = document.getElementById("playerBox");
    if (!box.contains(e.target)) closePlayer();
}

function toggleFullscreen() {
    const box = document.getElementById("playerBox");
    if (!document.fullscreenElement) {
        box.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

function saveCurrentSpot() {
    if (!currentVideoUrl) {
        alert("Apri prima un video!");
        return;
    }
    
    const input = prompt("A che minuto sei? (es: 15.30 per 15 minuti e 30 secondi)\nUsa il punto per i decimali:");
    
    if (input === null) return;
    
    let minuti = parseFloat(input.replace(',', '.'));
    
    if (isNaN(minuti) || minuti < 0) {
        alert("Inserisci un numero valido!");
        return;
    }
    
    const secondi = Math.floor(minuti * 60);
    localStorage.setItem("time_movie_" + currentVideoUrl, secondi);
    
    const savedInfo = document.getElementById("savedInfo");
    const minutiMostra = Math.floor(secondi / 60);
    const secondiMostra = secondi % 60;
    savedInfo.innerHTML = `✅ Salvato! Riprenderò da ${minutiMostra}:${secondiMostra.toString().padStart(2,'0')} (${secondi} secondi)`;
    savedInfo.style.color = "#4ade80";
    
    setTimeout(() => {
        if (document.getElementById("playerModal").style.display === "flex") {
            savedInfo.style.color = "#f59e0b";
        }
    }, 3000);
    
    alert(`✅ Posizione salvata a ${minuti} minuti (${secondi} secondi)!`);
}

function resetSavedSpot() {
    if (!currentVideoUrl) {
        alert("Apri prima un video!");
        return;
    }
    
    const savedTime = localStorage.getItem("time_movie_" + currentVideoUrl);
    if (!savedTime) {
        alert("⚠️ Non c'è nessun salvataggio per questo video!");
        return;
    }
    
    const conferma = confirm("Sei sicuro di voler cancellare la posizione salvata?");
    
    if (conferma) {
        localStorage.removeItem("time_movie_" + currentVideoUrl);
        
        const savedInfo = document.getElementById("savedInfo");
        savedInfo.innerHTML = `🗑 Salvataggio rimosso! Il video ripartirà dall'inizio`;
        savedInfo.style.color = "#ef4444";
        
        setTimeout(() => {
            if (document.getElementById("playerModal").style.display === "flex") {
                savedInfo.innerHTML = `🎬 Nessun salvataggio - il video partirà dall'inizio`;
                savedInfo.style.color = "#888";
            }
        }, 3000);
        
        alert("✅ Posizione cancellata!");
    }
}

/* NAVIGAZIONE */
function goBack() {
    window.history.back();
}

function goToList() {
    window.location.href = "list.html";
}

function escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

/* TORNA SU */
const tornaSuBtn = document.getElementById("tornaSu");

window.addEventListener("scroll", function() {
    if (window.scrollY > 300) {
        tornaSuBtn.style.display = "flex";
    } else {
        tornaSuBtn.style.display = "none";
    }
});

tornaSuBtn.addEventListener("click", function() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
});

loadMovieDetails();

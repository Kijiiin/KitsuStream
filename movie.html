<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dettagli Film</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0c29;
    color: white;
}

.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 30px;
    position: relative;
}

.topbar-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.poster {
    width: 250px;
    border-radius: 10px;
}

.flex {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

h2 {
    margin: 0;
    font-size: 28px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(124,58,237,0.3);
}

button {
    padding: 10px 15px;
    background: #7c3aed;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.back {
    background: #444;
}

.top-actions {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

/* PLAYER */
.player-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.player-box {
    width: 90%;
    max-width: 1000px;
}

.player-box iframe {
    width: 100%;
    height: 500px;
    border: none;
    border-radius: 10px;
}

.player-controls {
    margin-top: 10px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

.close-btn {
    background: red;
}

.fullscreen-btn {
    background: #00d4ff;
}

.save-btn {
    background: #f59e0b;
}

.reset-btn {
    background: #ef4444;
}

.saved-info {
    background: #1f1b3a;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    margin-left: 10px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
}

/* PULSANTE TORNA SU */
#tornaSu {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    font-size: 24px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(124,58,237,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    z-index: 9998;
}

#tornaSu:hover {
    transform: translateY(-5px);
    background: linear-gradient(135deg, #a855f7, #c084fc);
    box-shadow: 0 6px 20px rgba(124,58,237,0.8);
}
</style>
</head>

<body>

<div class="container">

    <div class="topbar-center">
        <h2>🎬 KitsuStream</h2>
    </div>

    <div class="top-actions">
        <button onclick="goBack()">⬅ Torna indietro</button>
        <button onclick="goToList()">⭐ Lista</button>
    </div>

    <div id="movieDetails"></div>

</div>

<!-- PLAYER -->
<div id="playerModal" class="player-modal" onclick="handleOutsideClick(event)">
    <div class="player-box" id="playerBox">
        <iframe id="videoFrame" allowfullscreen></iframe>

        <div class="player-controls">
            <button class="fullscreen-btn" onclick="toggleFullscreen()">🖥 Schermo intero</button>
            <button class="save-btn" onclick="saveCurrentSpot()">💾 Salva posizione</button>
            <button class="reset-btn" onclick="resetSavedSpot()">🗑 Reset posizione</button>
            <button class="close-btn" onclick="closePlayer()">❌ Chiudi</button>
        </div>
        
        <div id="savedInfo" style="text-align: center; margin-top: 8px; min-height: 30px;"></div>
    </div>
</div>

<!-- PULSANTE TORNA SU -->
<button id="tornaSu" title="Torna su">↑</button>

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";

const params = new URLSearchParams(window.location.search);
const movieId = params.get("id");

let currentVideoUrl = "";

loadMovie();

/* LOAD MOVIE */
async function loadMovie() {
    const res = await fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${API_KEY}&language=it-IT`);
    const movie = await res.json();

    const poster = movie.poster_path
        ? IMG_BASE + movie.poster_path
        : "https://via.placeholder.com/500x750";

    const link = `https://vixsrc.to/movie/${movie.id}`;
    const inList = isInList(movie.id);

    document.getElementById("movieDetails").innerHTML = `
        <div class="flex">
            <img class="poster" src="${poster}">

            <div>
                <h1>${movie.title}</h1>
                <p><b>Data:</b> ${movie.release_date}</p>
                <p><b>Voto:</b> ${movie.vote_average}</p>
                <p><b>Durata:</b> ${movie.runtime} min</p>
                <p><b>Generi:</b> ${movie.genres.map(g => g.name).join(", ")}</p>

                <p style="margin-top:15px;">
                    ${movie.overview || "Nessuna descrizione disponibile"}
                </p>

                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button onclick="openPlayer('${link}')">▶ Guarda ora</button>

                    <button 
                        id="listBtn"
                        onclick="toggleList(${movie.id}, '${movie.title.replace(/'/g,"\\'")}', '${poster.replace(/'/g,"\\'")}', '${link}')"
                        style="background:${inList ? '#ef4444' : '#7c3aed'}"
                    >
                        ${inList ? "❌ Rimuovi" : "⭐ Lista"}
                    </button>
                </div>
            </div>
        </div>
    `;
}

/* NAV */
function goBack() {
    window.history.back();
}

function goToList() {
    window.location.href = "list.html";
}

/* PLAYER */
function openPlayer(url) {
    const modal = document.getElementById("playerModal");
    const frame = document.getElementById("videoFrame");
    
    // Controlla se c'è un tempo salvato per questo video
    const savedTime = localStorage.getItem("time_" + url);
    let finalUrl = url;
    let savedInfo = document.getElementById("savedInfo");
    
    if (savedTime && parseInt(savedTime) > 0) {
        const secondi = parseInt(savedTime);
        const minuti = Math.floor(secondi / 60);
        const secondiRestanti = secondi % 60;
        finalUrl += `?startAt=${secondi}`;
        savedInfo.innerHTML = `📌 Riprenderò da ${minuti}:${secondiRestanti.toString().padStart(2,'0')} (${secondi} secondi)`;
        savedInfo.style.color = "#f59e0b";
    } else {
        savedInfo.innerHTML = `🎬 Nessun salvataggio - il video partirà dall'inizio`;
        savedInfo.style.color = "#888";
    }
    
    currentVideoUrl = url;
    frame.src = finalUrl;
    modal.style.display = "flex";
}

function closePlayer() {
    const frame = document.getElementById("videoFrame");
    frame.src = "";
    document.getElementById("playerModal").style.display = "none";
    document.getElementById("savedInfo").innerHTML = "";

    if (document.fullscreenElement) {
        document.exitFullscreen();
    }
}

function handleOutsideClick(e) {
    const box = document.getElementById("playerBox");
    if (!box.contains(e.target)) closePlayer();
}

function toggleFullscreen() {
    const box = document.getElementById("playerBox");

    if (!document.fullscreenElement) {
        box.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

/* SALVA POSIZIONE MANUALE */
function saveCurrentSpot() {
    if (!currentVideoUrl) {
        alert("Apri prima un video!");
        return;
    }
    
    const input = prompt("A che minuto sei? (es: 15.30 per 15 minuti e 30 secondi)\nUsa il punto per i decimali:");
    
    if (input === null) return;
    
    // Converti minuti (es. 15.30) in secondi
    let minuti = parseFloat(input.replace(',', '.'));
    
    if (isNaN(minuti) || minuti < 0) {
        alert("Inserisci un numero valido!");
        return;
    }
    
    const secondi = Math.floor(minuti * 60);
    localStorage.setItem("time_" + currentVideoUrl, secondi);
    
    // Aggiorna l'informazione a schermo
    const savedInfo = document.getElementById("savedInfo");
    const minutiMostra = Math.floor(secondi / 60);
    const secondiMostra = secondi % 60;
    savedInfo.innerHTML = `✅ Salvato! Riprenderò da ${minutiMostra}:${secondiMostra.toString().padStart(2,'0')} (${secondi} secondi)`;
    savedInfo.style.color = "#4ade80";
    
    setTimeout(() => {
        if (document.getElementById("playerModal").style.display === "flex") {
            savedInfo.style.color = "#f59e0b";
        }
    }, 3000);
    
    alert(`✅ Posizione salvata a ${minuti} minuti (${secondi} secondi)!\nLa prossima volta che apri questo video ripartirai da qui.`);
}

/* RESET POSIZIONE */
function resetSavedSpot() {
    if (!currentVideoUrl) {
        alert("Apri prima un video!");
        return;
    }
    
    const savedTime = localStorage.getItem("time_" + currentVideoUrl);
    if (!savedTime) {
        alert("⚠️ Non c'è nessun salvataggio per questo video!");
        return;
    }
    
    const conferma = confirm("Sei sicuro di voler cancellare la posizione salvata?\nIl video ripartirà dall'inizio la prossima volta.");
    
    if (conferma) {
        localStorage.removeItem("time_" + currentVideoUrl);
        
        // Aggiorna l'informazione a schermo
        const savedInfo = document.getElementById("savedInfo");
        savedInfo.innerHTML = `🗑 Salvataggio rimosso! Il video ripartirà dall'inizio`;
        savedInfo.style.color = "#ef4444";
        
        setTimeout(() => {
            if (document.getElementById("playerModal").style.display === "flex") {
                savedInfo.innerHTML = `🎬 Nessun salvataggio - il video partirà dall'inizio`;
                savedInfo.style.color = "#888";
            }
        }, 3000);
        
        alert("✅ Posizione cancellata! La prossima volta il video partirà dall'inizio.");
    }
}

/* LIST */
function getList() {
    return JSON.parse(localStorage.getItem("myMovies")) || [];
}

function saveList(list) {
    localStorage.setItem("myMovies", JSON.stringify(list));
}

function isInList(id) {
    return getList().some(m => m.id === id);
}

function toggleList(id, title, poster, link) {
    let list = getList();
    const exists = list.find(m => m.id === id);

    if (exists) {
        list = list.filter(m => m.id !== id);
    } else {
        list.push({ id, title, poster, link });
    }

    saveList(list);

    const btn = document.getElementById("listBtn");
    const nowInList = !exists;

    btn.innerText = nowInList ? "❌ Rimuovi" : "⭐ Lista";
    btn.style.background = nowInList ? "#ef4444" : "#7c3aed";
}

/* TORNA SU */
const tornaSuBtn = document.getElementById("tornaSu");

window.addEventListener("scroll", function() {
    if (window.scrollY > 300) {
        tornaSuBtn.style.display = "flex";
    } else {
        tornaSuBtn.style.display = "none";
    }
});

tornaSuBtn.addEventListener("click", function() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
});
</script>

</body>
</html>
